<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Obsidian Elite v4 | Advanced Quant Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00FFCC; --secondary: #00D9FF; --bg-dark: #030508; --bg-card: #0a0e14; }
        body { background: #030508; color: #ffffff; font-family: 'JetBrains Mono', monospace; }
        .glass-card { background: rgba(10, 14, 20, 0.7); border: 1px solid rgba(0, 255, 204, 0.1); border-radius: 12px; }
        label { color: var(--primary); font-weight: 700; font-size: 10px; text-transform: uppercase; display: block; margin-bottom: 8px; }
        input, select { background: #0d1117; border: 1px solid #30363d; color: #fff; padding: 10px; border-radius: 6px; width: 100%; outline: none; }
        .toggle-btn { cursor: pointer; background: #161b22; border: 1px solid #30363d; padding: 8px; border-radius: 6px; text-align: center; font-size: 12px; transition: 0.2s; }
        .toggle-btn.active { background: var(--brand-color) !important; color: #000 !important; font-weight: 800; box-shadow: 0 0 15px var(--brand-color); }
        .modern-table th { cursor: pointer; user-select: none; transition: background 0.2s; }
        .modern-table th:hover { background: rgba(0, 255, 204, 0.1); }
        .frozen-row { opacity: 0.6; background: rgba(255, 255, 255, 0.02); }
        .matrix-box { cursor: pointer; transition: 0.3s; overflow: hidden; }
        .matrix-box:hover { border-color: var(--primary); }
        .collapsed-content { display: none; }
    </style>
</head>
<body class="p-4 lg:p-8">
    <div class="max-w-[1920px] mx-auto">
        <div class="flex justify-between items-end mb-8">
            <div>
                <h1 class="text-4xl font-black text-[#00FFCC] uppercase">Obsidian <span class="text-white">Elite</span></h1>
                <p class="text-[10px] text-gray-400 mt-2 uppercase tracking-widest">Execution Terminal | <span id="currentDateDisplay"></span></p>
            </div>
            <div class="flex gap-4">
                <div class="glass-card p-4 text-right"><label>Net P&L</label><div id="totalPnl" class="text-3xl font-black text-green-400">$0.00</div></div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="glass-card p-4 matrix-box border border-gray-800" onclick="toggleDrill(this)">
                <div class="flex justify-between items-center"><label>Daily Matrix</label><span>展开/折叠</span></div>
                <div class="text-2xl font-black mt-2">Win Rate: <span id="dailyWin">0%</span></div>
                <div class="collapsed-content mt-2 text-xs text-gray-400 border-t border-gray-800 pt-2">
                    Trades: <span id="dailyTrades">0</span> | Profit: <span id="dailyProfit">$0</span>
                </div>
            </div>
            <div class="glass-card p-4 matrix-box border border-gray-800" onclick="toggleDrill(this)">
                <div class="flex justify-between items-center"><label>Weekly Matrix</label><span>展开/折叠</span></div>
                <div class="text-2xl font-black mt-2">Net: <span id="weeklyPnl">$0</span></div>
                <div class="collapsed-content mt-2 text-xs text-gray-400 border-t border-gray-800 pt-2">
                    Weekly Volume: <span id="weeklyVol">0</span> contracts
                </div>
            </div>
            <div class="glass-card p-4 matrix-box border border-gray-800" onclick="toggleDrill(this)">
                <div class="flex justify-between items-center"><label>Monthly Matrix</label><span>展开/折叠</span></div>
                <div class="text-2xl font-black mt-2">Growth: <span id="monthlyGrowth">0%</span></div>
                <div class="collapsed-content mt-2 text-xs text-gray-400 border-t border-gray-800 pt-2">
                    Month-to-Date P&L: <span id="monthlyPnl">$0</span>
                </div>
            </div>
        </div>

        <div class="glass-card p-6 mb-6 border-t-2 border-t-[#00FFCC]">
            <form id="tradeForm" class="grid grid-cols-1 md:grid-cols-5 gap-6">
                <div><label>Symbol</label><input type="text" id="ticker" placeholder="e.g. SPY" required></div>
                <div><label>Type</label><select id="type"><option value="CALL">CALL</option><option value="PUT">PUT</option></select></div>
                <div><label>Qty</label><input type="number" id="qty" value="1"></div>
                <div><label>Entry</label><input type="number" id="entry" step="0.01" required></div>
                <div><label>Action</label><button type="submit" class="bg-[#00FFCC] text-black w-full py-2.5 rounded font-black uppercase text-sm">Open Trade</button></div>
            </form>
        </div>

        <div class="glass-card overflow-hidden">
            <table class="w-full text-left modern-table">
                <thead class="bg-gray-900/50">
                    <tr class="text-[#00FFCC] text-[10px]">
                        <th onclick="sortTable(0)">#</th>
                        <th onclick="sortTable(1)">Date</th>
                        <th onclick="sortTable(2)">Symbol</th>
                        <th onclick="sortTable(3)">Side</th>
                        <th onclick="sortTable(4)">Qty</th>
                        <th onclick="sortTable(5)">Entry</th>
                        <th onclick="sortTable(6)">Exit</th>
                        <th onclick="sortTable(7)">P&L</th>
                        <th class="text-center">Actions</th>
                    </tr>
                </thead>
                <tbody id="tradeBody" class="text-sm"></tbody>
            </table>
        </div>
    </div>

    <script>
        let trades = JSON.parse(localStorage.getItem('obsidian_v4_data')) || [];
        let currentSort = { col: null, asc: true };

        function toggleDrill(el) {
            const content = el.querySelector('.collapsed-content');
            content.style.display = content.style.display === 'block' ? 'none' : 'block';
        }

        function sortTable(colIndex) {
            currentSort.asc = currentSort.col === colIndex ? !currentSort.asc : true;
            currentSort.col = colIndex;
            
            trades.sort((a, b) => {
                let valA = Object.values(a)[colIndex];
                let valB = Object.values(b)[colIndex];
                if (colIndex === 0 || colIndex >= 4) { // Numbers
                    return currentSort.asc ? valA - valB : valB - valA;
                }
                return currentSort.asc ? String(valA).localeCompare(String(valB)) : String(valB).localeCompare(String(valA));
            });
            render();
        }

        document.getElementById('tradeForm').onsubmit = (e) => {
            e.preventDefault();
            const newTrade = {
                id: trades.length + 1,
                date: new Date().toISOString().split('T')[0],
                symbol: document.getElementById('ticker').value.toUpperCase(),
                side: document.getElementById('type').value,
                qty: parseInt(document.getElementById('qty').value),
                entry: parseFloat(document.getElementById('entry').value),
                exit: 0,
                pnl: 0
            };
            trades.unshift(newTrade);
            saveAndRender();
            e.target.reset();
        };

        function deleteTrade(index) {
            const tradeDate = trades[index].date;
            const today = new Date().toISOString().split('T')[0];
            
            if (tradeDate !== today) {
                alert("ANTI-TAMPER LOCK: Cannot delete trades from previous days.");
                return;
            }
            
            if(confirm("Delete this trade?")) {
                trades.splice(index, 1);
                saveAndRender();
            }
        }

        function saveAndRender() {
            localStorage.setItem('obsidian_v4_data', JSON.stringify(trades));
            render();
        }

        function render() {
            const body = document.getElementById('tradeBody');
            const today = new Date().toISOString().split('T')[0];
            body.innerHTML = '';
            let total = 0;

            trades.forEach((t, i) => {
                const isFrozen = t.date !== today;
                total += t.pnl;
                body.innerHTML += `
                    <tr class="border-b border-gray-800 ${isFrozen ? 'frozen-row' : ''}">
                        <td class="p-4 text-gray-500">${t.id}</td>
                        <td class="p-4">${t.date}</td>
                        <td class="p-4 font-bold">${t.symbol}</td>
                        <td class="p-4 ${t.side==='CALL'?'text-green-400':'text-red-400'}">${t.side}</td>
                        <td class="p-4">${t.qty}</td>
                        <td class="p-4">$${t.entry.toFixed(2)}</td>
                        <td class="p-4">${t.exit ? '$'+t.exit.toFixed(2) : '--'}</td>
                        <td class="p-4 font-bold ${t.pnl >=0 ? 'text-green-400' : 'text-red-400'}">$${t.pnl.toFixed(2)}</td>
                        <td class="p-4 text-center">
                            ${isFrozen ? '<span class="text-[10px] text-gray-600">LOCKED</span>' : 
                            `<button onclick="deleteTrade(${i})" class="text-red-500 hover:text-white">🗑️</button>`}
                        </td>
                    </tr>`;
            });

            document.getElementById('totalPnl').innerText = '$' + total.toFixed(2);
            document.getElementById('currentDateDisplay').innerText = new Date().toDateString();
        }

        window.onload = render;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Obsidian Elite | Quant Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #030508; color: #ffffff; font-family: 'JetBrains Mono', monospace; }
        .stat-card { background: linear-gradient(145deg, #0a0e14 0%, #06090c 100%); border: 1px solid #1f2937; border-radius: 16px; position: relative; overflow: hidden; }
        .stat-card::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, #00f2ff, transparent); opacity: 0.3; }
        label { color: #94a3b8; font-weight: 800; font-size: 10px; text-transform: uppercase; margin-bottom: 8px; display: block; letter-spacing: 0.1em; }
        input, select { background-color: #0d1117; border: 1px solid #30363d; color: #fff; padding: 10px; border-radius: 8px; font-size: 14px; width: 100%; outline: none; }
        input:focus { border-color: #00f2ff; }
        input:disabled { opacity: 0.4; cursor: not-allowed; background-color: #030508; }
        .gauge-container { position: relative; height: 140px; width: 140px; }
        .gauge-value { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.5rem; color: #00f2ff; text-shadow: 0 0 10px rgba(0, 242, 255, 0.5); }
        .metric-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .metric-label { font-size: 10px; font-weight: 700; color: #64748b; text-transform: uppercase; }
        .metric-val { font-size: 14px; font-weight: 800; }
        .toggle-group { display: flex; gap: 4px; background: #161b22; padding: 4px; border-radius: 8px; border: 1px solid #30363d; flex-wrap: wrap; }
        .toggle-btn { flex: 1; min-width: 45px; text-align: center; padding: 8px 4px; font-size: 9px; font-weight: 800; border-radius: 6px; cursor: pointer; color: #4b5563; background: #0d1117; border: 1px solid #30363d; transition: 0.2s; }
        .toggle-btn.active { border-color: #00f2ff; color: #fff; }
        .toggle-btn.active[data-type="CALL"], .toggle-btn.active[data-val="Y"], .toggle-btn.active[data-val="BUY"], .toggle-btn.active[data-val="Above"], .toggle-btn.active[data-val="HI"] { background: #064e3b; color: #4ade80; }
        .toggle-btn.active[data-type="PUT"], .toggle-btn.active[data-val="N"], .toggle-btn.active[data-val="SELL"], .toggle-btn.active[data-val="Below"], .toggle-btn.active[data-val="LO"] { background: #7f1d1d; color: #f87171; }
        .toggle-btn.active.blue { background: #1e3a8a; color: #60a5fa; }
        .btn-live { background: linear-gradient(to bottom, #00f2ff, #0077ff); color: white; padding: 14px; font-weight: 800; border-radius: 10px; width: 100%; text-transform: uppercase; cursor: pointer; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-[1850px] mx-auto">
        <div class="flex justify-between items-end mb-8">
            <div>
                <h1 class="text-3xl font-black text-cyan-400 uppercase tracking-tighter">Obsidian <span class="text-white">Elite</span></h1>
                <p class="text-[10px] font-bold text-gray-500 mt-1 uppercase tracking-widest">Execution Terminal | NY: <span id="currentDateDisplay" class="text-cyan-400"></span></p>
            </div>
            <div class="flex gap-6">
                <div class="text-right"><p class="text-gray-500 text-[10px] font-black uppercase">Net P&L</p><p id="totalPnl" class="text-3xl font-black text-green-400">$0.00</p></div>
                <div class="text-right border-l border-gray-800 pl-6"><p class="text-gray-500 text-[10px] font-black uppercase">Exposure</p><p id="activeCount" class="text-3xl font-black text-cyan-400">0</p></div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 mb-8">
            <div class="lg:col-span-2 stat-card p-6 h-[300px]"><label>Equity Curve</label><canvas id="dailyPnlChart"></canvas></div>
            <div class="stat-card p-6 h-[300px] flex flex-col items-center justify-center">
                <label class="self-start">Execution Precision</label>
                <div class="gauge-container"><canvas id="winLossChart"></canvas><div class="gauge-value" id="winRatioPercent">0%</div></div>
            </div>
            <div class="stat-card p-6 h-[300px]">
                <label>Efficiency Matrix</label>
                <div class="metric-row"><span class="metric-label">Profit Factor</span><span id="profitFactor" class="metric-val text-cyan-400">0.00</span></div>
                <div class="metric-row"><span class="metric-label">Avg Win Hold</span><span id="avgWinTime" class="metric-val text-green-400">--</span></div>
                <div class="metric-row border-none"><span class="metric-label">Avg Loss Hold</span><span id="avgLossTime" class="metric-val text-red-500">--</span></div>
            </div>
        </div>

        <div id="formContainer" class="stat-card p-8 mb-10 border-t-4 border-t-cyan-500">
            <form id="tradeForm" class="grid grid-cols-1 md:grid-cols-4 lg:grid-cols-6 gap-6">
                <input type="hidden" id="editId" value="">
                
                <div class="col-span-2">
                    <label>Ticker</label>
                    <div class="toggle-group" id="tickerSelect">
                        <div class="toggle-btn" data-ticker="SPY">SPY</div><div class="toggle-btn" data-ticker="SPX">SPX</div>
                        <div class="toggle-btn" data-ticker="TSLA">TSLA</div><div class="toggle-btn" data-ticker="NVDA">NVDA</div>
                        <div class="toggle-btn" data-ticker="AAPL">AAPL</div><div class="toggle-btn" data-ticker="AMD">AMD</div>
                        <div class="toggle-btn" data-ticker="META">META</div><div class="toggle-btn" data-ticker="QQQ">QQQ</div>
                    </div>
                </div>
                <div>
                    <label>Type</label>
                    <div class="toggle-group" id="typeSelect">
                        <div class="toggle-btn" data-type="CALL">CALL</div><div class="toggle-btn" data-type="PUT">PUT</div>
                    </div>
                </div>
                <div><label>Qty</label><input type="number" id="count" value="1" min="1"></div>
                <div><label>Entry Price</label><input type="number" id="entry" step="0.01" placeholder="Required"></div>
                <div><label>Exit Price</label><input type="number" id="exit" step="0.01" placeholder="Locked" disabled></div>
                
                <div class="col-span-full grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-4 border-t border-gray-800 pt-6">
                    <div><label>Setup</label><select id="setup"><option value="">Select...</option><option>A+</option><option>V-Rev</option><option>Scalp</option></select></div>
                    <div><label>VWAP</label><div class="toggle-group" data-id="vwap"><div class="toggle-btn" data-val="Y">Y</div><div class="toggle-btn" data-val="N">N</div></div></div>
                    <div><label>EMA 5/12</label><div class="toggle-group" data-id="ema5"><div class="toggle-btn" data-val="BUY">B</div><div class="toggle-btn" data-val="SELL">S</div></div></div>
                    <div><label>MTF</label><div class="toggle-group" data-id="mtf"><div class="toggle-btn blue" data-val="H34">H34</div><div class="toggle-btn blue" data-val="21">21</div><div class="toggle-btn blue" data-val="55">55</div></div></div>
                    <div><label>PM Range</label><div class="toggle-group" data-id="pmRange"><div class="toggle-btn" data-val="HI">HI</div><div class="toggle-btn" data-val="LO">LO</div></div></div>
                    <div><label>PD Range</label><div class="toggle-group" data-id="pdRange"><div class="toggle-btn" data-val="HI">HI</div><div class="toggle-btn" data-val="LO">LO</div></div></div>
                    <div><label>PDC Level</label><div class="toggle-group" data-id="pdc"><div class="toggle-btn" data-val="Above">Abv</div><div class="toggle-btn" data-val="Below">Bel</div></div></div>
                </div>

                <div class="col-span-full flex gap-4">
                    <button type="submit" id="submitBtn" class="btn-live">Open Live Trade</button>
                    <button type="button" id="cancelBtn" onclick="resetForm()" class="hidden bg-gray-800 p-4 rounded-lg font-bold">Cancel</button>
                </div>
            </form>
        </div>

        <div class="stat-card overflow-hidden">
            <table class="w-full text-left text-xs">
                <thead class="bg-gray-900/50 uppercase text-gray-500">
                    <tr><th class="p-5">Asset</th><th class="p-5">Timeline</th><th class="p-5">Fills</th><th class="p-5 text-right">PNL</th><th class="p-5 text-center">Manage</th></tr>
                </thead>
                <tbody id="tradeBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let trades = JSON.parse(localStorage.getItem('obsidian_elite_v11')) || [];
        let pnlChart, winLossChart;

        function initCharts() {
            const commonOptions = { responsive: true, maintainAspectRatio: false, plugins: { legend: false } };
            pnlChart = new Chart(document.getElementById('dailyPnlChart'), { type: 'bar', data: { labels: [], datasets: [{ data: [], backgroundColor: '#00f2ff' }] }, options: commonOptions });
            winLossChart = new Chart(document.getElementById('winLossChart'), { type: 'doughnut', data: { labels: ['W', 'L'], datasets: [{ data: [0, 0], backgroundColor: ['#4ade80', '#f87171'], cutout: '85%' }] }, options: commonOptions });
        }

        function updateAnalytics() {
            const closed = trades.filter(t => t.status === 'CLOSED');
            const dailyData = {};
            let wins = 0, losses = 0, winTime = 0, lossTime = 0, grossP = 0, grossL = 0;
            closed.forEach(t => {
                const pnl = parseFloat(t.pnl);
                dailyData[t.date] = (dailyData[t.date] || 0) + pnl;
                const s = t.entryTime.split(':'), e = (t.exitTime || "0:0:0").split(':');
                const dur = (parseInt(e[0])*3600 + parseInt(e[1])*60 + parseInt(e[2])) - (parseInt(s[0])*3600 + parseInt(s[1])*60 + parseInt(s[2]));
                if (pnl >= 0) { wins++; winTime += dur; grossP += pnl; } 
                else { losses++; lossTime += dur; grossL += Math.abs(pnl); }
            });
            const sortedDates = Object.keys(dailyData).sort();
            pnlChart.data.labels = sortedDates;
            pnlChart.data.datasets[0].data = sortedDates.map(d => dailyData[d]);
            pnlChart.data.datasets[0].backgroundColor = sortedDates.map(d => dailyData[d] >= 0 ? '#4ade80' : '#f87171');
            pnlChart.update();
            winLossChart.data.datasets[0].data = [wins || 1, losses || (wins ? 0 : 1)];
            winLossChart.update();
            document.getElementById('winRatioPercent').innerText = (closed.length ? Math.round((wins/closed.length)*100) : 0) + '%';
            document.getElementById('profitFactor').innerText = grossL > 0 ? (grossP / grossL).toFixed(2) : (grossP > 0 ? "INF" : "0.00");
            document.getElementById('avgWinTime').innerText = wins > 0 ? Math.floor((winTime/wins)/60) + "m" : "--";
            document.getElementById('avgLossTime').innerText = losses > 0 ? Math.floor((lossTime/losses)/60) + "m" : "--";
        }

        function render() {
            localStorage.setItem('obsidian_elite_v11', JSON.stringify(trades));
            const body = document.getElementById('tradeBody'); body.innerHTML = '';
            let total = 0, active = 0;
            trades.forEach((t, i) => {
                const isC = t.status === 'CLOSED';
                if(!isC) active++; else total += parseFloat(t.pnl);
                body.innerHTML += `<tr class="border-b border-gray-800/50">
                    <td class="p-5"><span class="font-black text-white">${t.stock}</span> <span class="${t.option === 'CALL' ? 'text-green-500' : 'text-red-500'}">${t.option}</span></td>
                    <td class="p-5 text-gray-400">${t.entryTime} → ${t.exitTime || '--'}</td>
                    <td class="p-5 text-white">${t.entry} → ${t.exit || '??'} <span class="text-gray-600">(${t.count}x)</span></td>
                    <td class="p-5 text-right font-black ${parseFloat(t.pnl) >= 0 ? 'text-green-400' : 'text-red-500'}">${isC ? '$'+t.pnl : '--'}</td>
                    <td class="p-5 text-center"><div class="flex justify-center gap-3">
                        <button onclick="editTrade(${i})" class="hover:text-cyan-400">✏️</button>
                        <button onclick="removeTrade(${i})" class="hover:text-red-500">🗑️</button>
                        ${!isC ? `<button onclick="closeTradeUI(${i})" class="bg-orange-500 text-white px-2 py-1 rounded text-[9px] font-bold">CLOSE</button>` : ''}
                    </div></td></tr>`;
            });
            document.getElementById('activeCount').innerText = active;
            document.getElementById('totalPnl').innerText = '$' + total.toFixed(2);
            updateAnalytics();
        }

        document.querySelectorAll('.toggle-btn').forEach(btn => {
            btn.onclick = function() {
                if(this.closest('#tickerSelect') && document.getElementById('editId').value !== "") return; // Lock ticker on edit
                if(this.closest('#typeSelect') && document.getElementById('editId').value !== "") return; // Lock type on edit
                this.parentElement.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            };
        });

        document.getElementById('tradeForm').onsubmit = (e) => {
            e.preventDefault();
            const editId = document.getElementById('editId').value;
            const ticker = document.querySelector('#tickerSelect .active')?.dataset.ticker;
            const type = document.querySelector('#typeSelect .active')?.dataset.type;
            const entryVal = document.getElementById('entry').value;
            const exitVal = document.getElementById('exit').value;
            const getV = (id) => document.querySelector(`.toggle-group[data-id="${id}"] .active`)?.dataset.val;

            // 1. ENTRY MODE VALIDATION (Only for NEW Trades)
            if (editId === "") {
                if (!ticker || !type || !entryVal) {
                    alert("STRICT GOVERNANCE: Ticker, Type, and Entry Price are mandatory to open a position.");
                    return;
                }
            } 
            // 2. EXIT MODE VALIDATION (Only when CLOSING an existing trade)
            else if (exitVal !== "") {
                const setup = document.getElementById('setup').value;
                const contexts = ['vwap', 'ema5', 'mtf', 'pmRange', 'pdRange', 'pdc'];
                const missing = contexts.filter(id => !getV(id));
                if (!setup || setup === "" || missing.length > 0) {
                    alert(`MANDATORY EXIT DATA MISSING:\n- Setup required\n- All Context Toggles required (${missing.join(', ').toUpperCase()})`);
                    return;
                }
            }

            const tradeData = {
                stock: ticker, option: type, count: document.getElementById('count').value,
                entry: parseFloat(entryVal), setup: document.getElementById('setup').value,
                vwap: getV('vwap') || '-', ema5: getV('ema5') || '-', mtf: getV('mtf') || '-',
                pmRange: getV('pmRange') || '-', pdRange: getV('pdRange') || '-', pdc: getV('pdc') || '-',
                date: new Date().toISOString().split('T')[0]
            };

            if (editId !== "") {
                const t = trades[editId];
                trades[editId] = { ...t, ...tradeData };
                if (exitVal) {
                    const ex = parseFloat(exitVal);
                    trades[editId].exit = ex;
                    trades[editId].status = 'CLOSED';
                    trades[editId].exitTime = t.exitTime || new Date().toLocaleTimeString('en-US', { hour12: false });
                    trades[editId].pnl = ((ex - tradeData.entry) * 100 * tradeData.count).toFixed(2);
                }
            } else {
                trades.unshift({ ...tradeData, status: 'OPEN', id: Date.now(), entryTime: new Date().toLocaleTimeString('en-US', { hour12: false }), pnl: 0 });
            }
            resetForm(); render();
        };

        function editTrade(i) {
            const t = trades[i];
            document.getElementById('editId').value = i;
            
            // Set and Lock Entry Data
            document.getElementById('entry').value = t.entry;
            document.getElementById('entry').disabled = true;
            document.getElementById('count').value = t.count;
            
            // Activate existing Ticker/Type buttons
            document.querySelectorAll('#tickerSelect .toggle-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.ticker === t.stock);
            });
            document.querySelectorAll('#typeSelect .toggle-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.type === t.option);
            });

            document.getElementById('exit').disabled = false;
            document.getElementById('submitBtn').innerText = "Finalize Record";
            document.getElementById('cancelBtn').classList.remove('hidden');
        }

        function closeTradeUI(i) { editTrade(i); document.getElementById('exit').focus(); }
        function removeTrade(i) { if(confirm("Delete?")) { trades.splice(i, 1); render(); } }

        function resetForm() { 
            document.getElementById('tradeForm').reset(); 
            document.getElementById('editId').value = ''; 
            document.getElementById('exit').disabled = true; 
            document.getElementById('entry').disabled = false; 
            document.getElementById('submitBtn').innerText = "Open Live Trade";
            document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('cancelBtn').classList.add('hidden');
            render(); 
        }

        window.onload = () => { 
            initCharts(); 
            render(); 
            document.getElementById('currentDateDisplay').innerText = new Date().toISOString().split('T')[0]; 
        };
    </script>
</body>
</html>

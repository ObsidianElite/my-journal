<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Obsidian Elite | Intelligence Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #030508; color: #ffffff; font-family: 'JetBrains Mono', monospace; }
        .stat-card { background: #0a0e14; border: 1px solid #1f2937; border-radius: 12px; }
        label { color: #00f2ff; font-weight: 800; font-size: 13px; text-transform: uppercase; margin-bottom: 8px; display: block; letter-spacing: 0.05em; }
        input, select { background-color: #0d1117; border: 1px solid #30363d; color: #fff; padding: 12px; border-radius: 8px; font-size: 15px; width: 100%; outline: none; }
        .trade-text { font-size: 14px; font-weight: 700; }
        .pnl-text { font-size: 18px; font-weight: 800; }
        .toggle-group { display: flex; gap: 4px; background: #161b22; padding: 4px; border-radius: 8px; border: 1px solid #30363d; }
        .toggle-btn { flex: 1; text-align: center; padding: 10px 2px; font-size: 11px; font-weight: 800; border-radius: 6px; cursor: pointer; transition: all 0.2s; color: #4b5563; }
        .toggle-btn.active[data-val="Y"], .toggle-btn.active[data-val="BUY"], .toggle-btn.active[data-val="Buy"], .toggle-btn.active[data-val="HI"], .toggle-btn.active[data-val="Above"] { background: #064e3b; color: #4ade80; box-shadow: 0 0 10px rgba(74, 222, 128, 0.2); }
        .toggle-btn.active[data-val="N"], .toggle-btn.active[data-val="SELL"], .toggle-btn.active[data-val="Sell"], .toggle-btn.active[data-val="LO"], .toggle-btn.active[data-val="Below"] { background: #7f1d1d; color: #f87171; box-shadow: 0 0 10px rgba(248, 113, 113, 0.2); }
        .toggle-btn.active.blue { background: #1e3a8a; color: #60a5fa; }
        .btn-record { background: linear-gradient(to bottom, #00a3ff, #0077ff); color: white; padding: 16px; font-weight: 800; border-radius: 12px; width: 100%; transition: 0.3s; font-size: 16px; text-transform: uppercase; }
        .group-header { background: #111827; cursor: pointer; transition: 0.2s; border-left: 4px solid #00f2ff; }
        .group-header:hover { background: #1f2937; }
        .hidden-row { display: none; }
        th { font-size: 11px !important; letter-spacing: 0.1em; }
        .locked-badge { color: #4b5563; font-size: 16px; cursor: not-allowed; opacity: 0.5; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-[1750px] mx-auto">
        <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-8 gap-6">
            <div>
                <h1 class="text-4xl font-black text-cyan-400 tracking-tighter uppercase">Obsidian <span class="text-white">Elite</span></h1>
                <p class="text-sm font-bold text-gray-500 mt-1 uppercase">Command Center | NY EST: <span id="currentDateDisplay" class="text-cyan-400"></span></p>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 w-full lg:w-auto">
                <div class="stat-card px-8 py-4 border-cyan-500/30">
                    <p class="text-gray-500 text-[11px] font-black uppercase">Net P&L</p>
                    <p id="totalPnl" class="text-3xl font-black text-green-400 leading-tight">$0.00</p>
                </div>
                <div class="stat-card px-8 py-4 border-indigo-500/30"><p class="text-gray-500 text-[11px] font-black uppercase">Win Rate</p><p id="winRateDisplay" class="text-3xl font-black text-indigo-400 leading-tight">0%</p></div>
                <div class="stat-card px-8 py-4 border-purple-500/30"><p class="text-gray-500 text-[11px] font-black uppercase">Trades</p><p id="tradeCount" class="text-3xl font-black text-purple-400 leading-tight">0</p></div>
                <button onclick="exportCSV()" class="bg-white text-black px-6 py-4 rounded-xl font-black text-xs uppercase hover:bg-cyan-400 transition">Export CSV</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
            <div class="stat-card p-6 lg:col-span-2">
                <h2 class="text-xs font-black uppercase text-gray-400 tracking-widest mb-4">Daily Performance</h2>
                <div class="h-[220px]"><canvas id="pnlChart"></canvas></div>
            </div>
            <div class="stat-card p-6">
                <h2 class="text-xs font-black uppercase text-gray-400 tracking-widest mb-6">Consistency Meter</h2>
                <div class="space-y-8 mt-4">
                    <div><div class="flex justify-between text-xs font-bold mb-3"><span>Win Ratio Goal</span><span id="winBarText">0%</span></div><div class="w-full bg-gray-800 h-4 rounded-full overflow-hidden"><div id="winBarFill" class="h-full bg-cyan-500" style="width: 0%"></div></div></div>
                    <div><div class="flex justify-between text-xs font-bold mb-3"><span>Profit Factor</span><span id="pfDisplay">0.00</span></div><div class="w-full bg-gray-800 h-4 rounded-full overflow-hidden"><div id="pfBarFill" class="h-full bg-green-500" style="width: 0%"></div></div></div>
                </div>
            </div>
        </div>

        <div class="stat-card p-8 mb-10 border-t-4 border-t-cyan-500 shadow-2xl">
            <form id="tradeForm" class="grid grid-cols-1 md:grid-cols-4 lg:grid-cols-7 gap-8">
                <div class="flex flex-col"><label>Date</label><input type="date" id="date" required></div>
                <div class="flex flex-col"><label>Ticker</label><select id="stock"><option>TSLA</option><option>NVDA</option><option>AMD</option><option>COIN</option><option>MSTR</option><option>SPY</option><option>SPX</option><option>MU</option></select></div>
                <div class="flex flex-col"><label>Type</label><select id="optionType"><option value="C">CALL</option><option value="P">PUT</option></select></div>
                <div class="flex flex-col"><label>Qty</label><input type="number" id="count" value="1"></div>
                <div class="flex flex-col"><label>Entry</label><input type="number" id="entry" step="0.01" required></div>
                <div class="flex flex-col"><label>Exit</label><input type="number" id="exit" step="0.01" required></div>
                <div class="flex flex-col"><label>Setup</label><select id="setup"><option value="-">None</option><option>A+</option><option>B</option><option>C</option></select></div>
                <div class="flex flex-col"><label>VWAP Hold</label><div class="toggle-group" data-id="vwap"><div class="toggle-btn" data-val="Y">Y</div><div class="toggle-btn" data-val="N">N</div></div></div>
                <div class="flex flex-col"><label>EMA 5/12</label><div class="toggle-group" data-id="ema512"><div class="toggle-btn" data-val="BUY">BUY</div><div class="toggle-btn" data-val="SELL">SELL</div></div></div>
                <div class="flex flex-col"><label>EMA 34/50</label><div class="toggle-group" data-id="ema3450"><div class="toggle-btn" data-val="Buy">Buy</div><div class="toggle-btn" data-val="Sell">Sell</div></div></div>
                <div class="flex flex-col"><label>MTF</label><div class="toggle-group" data-id="mtf"><div class="toggle-btn blue" data-val="H34">H34</div><div class="toggle-btn blue" data-val="21">21</div><div class="toggle-btn blue" data-val="55">55</div></div></div>
                <div class="flex flex-col"><label>PM Range</label><div class="toggle-group" data-id="pmRange"><div class="toggle-btn" data-val="HI">HI</div><div class="toggle-btn" data-val="LO">LO</div></div></div>
                <div class="flex flex-col"><label>PD Range</label><div class="toggle-group" data-id="pdRange"><div class="toggle-btn" data-val="HI">HI</div><div class="toggle-btn" data-val="LO">LO</div></div></div>
                <div class="flex flex-col"><label>PDC Level</label><div class="toggle-group" data-id="pdc"><div class="toggle-btn" data-val="Above">Above</div><div class="toggle-btn" data-val="Below">Below</div></div></div>
                <div class="col-span-full mt-2"><button type="submit" class="btn-record">Record Daily Execution</button></div>
            </form>
        </div>

        <div class="flex justify-end gap-6 mb-5 px-2">
            <button onclick="toggleAllGroups(true)" class="text-xs font-black uppercase text-cyan-400 hover:text-white transition">↑ Collapse History</button>
            <button onclick="toggleAllGroups(false)" class="text-xs font-black uppercase text-gray-500 hover:text-white transition">↓ Expand All</button>
        </div>

        <div class="stat-card overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-gray-900/50 text-gray-500 uppercase font-black">
                    <tr>
                        <th class="p-5">Asset Info</th><th class="p-5">Fills</th><th class="p-5">VWAP</th><th class="p-5">5/12</th><th class="p-5">34/50</th><th class="p-5">MTF</th><th class="p-5">Setup</th><th class="p-5 text-right">PNL ($)</th><th class="p-5 text-right">PNL (%)</th><th class="p-5 text-center">Manage</th>
                    </tr>
                </thead>
                <tbody id="tradeBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let trades = JSON.parse(localStorage.getItem('obsidian_intel_v8')) || [];
        let pnlChart;

        document.querySelectorAll('.toggle-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const isActive = this.classList.contains('active');
                this.parentElement.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
                if(!isActive) this.classList.add('active');
            });
        });

        function getNYDate() {
            const nyString = new Date().toLocaleString("en-US", {timeZone: "America/New_York"});
            const d = new Date(nyString);
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }

        function initChart() {
            const ctx = document.getElementById('pnlChart').getContext('2d');
            pnlChart = new Chart(ctx, {
                type: 'bar',
                data: { labels: [], datasets: [{ data: [], backgroundColor: [] }] },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { grid: { color: '#1f2937' }, ticks: { color: '#6b7280', font: { size: 11 } } }, x: { grid: { display: false }, ticks: { color: '#6b7280', font: { size: 11 } } } }
                }
            });
        }

        function updateAnalytics() {
            if (!trades.length) return;
            let total = 0, wins = 0, grossWin = 0, grossLoss = 0;
            const dailyData = {};
            trades.forEach(t => {
                const val = parseFloat(t.pnl);
                total += val;
                if (val > 0) { wins++; grossWin += val; } else { grossLoss += Math.abs(val); }
                if (!dailyData[t.date]) dailyData[t.date] = 0;
                dailyData[t.date] += val;
            });
            const sortedDates = Object.keys(dailyData).sort().slice(-7);
            const dailyValues = sortedDates.map(date => dailyData[date]);
            document.getElementById('totalPnl').innerText = `$${total.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            document.getElementById('totalPnl').className = `text-3xl font-black ${total >= 0 ? 'text-green-400' : 'text-red-500'}`;
            document.getElementById('winRateDisplay').innerText = `${((wins/trades.length)*100).toFixed(0)}%`;
            document.getElementById('tradeCount').innerText = trades.length;
            document.getElementById('winBarFill').style.width = `${((wins/trades.length)*100)}%`;
            document.getElementById('winBarText').innerText = `${((wins/trades.length)*100).toFixed(0)}%`;
            const pf = grossLoss === 0 ? grossWin : (grossWin / grossLoss);
            document.getElementById('pfDisplay').innerText = pf.toFixed(2);
            document.getElementById('pfBarFill').style.width = `${Math.min(pf * 25, 100)}%`;
            pnlChart.data.labels = sortedDates.map(d => d.split('-').slice(1).join('/'));
            pnlChart.data.datasets[0].data = dailyValues;
            pnlChart.data.datasets[0].backgroundColor = dailyValues.map(v => v >= 0 ? '#10b981' : '#ef4444');
            pnlChart.update();
        }

        function toggleGroup(date) {
            const rows = document.querySelectorAll(`[data-date-group="${date}"]`);
            const icon = document.getElementById(`icon-${date}`);
            rows.forEach(row => row.classList.toggle('hidden-row'));
            icon.innerText = rows[0].classList.contains('hidden-row') ? '▶' : '▼';
        }

        function toggleAllGroups(collapse) {
            const headers = document.querySelectorAll('.group-header');
            headers.forEach(header => {
                const date = header.getAttribute('onclick').match(/'([^']+)'/)[1];
                const rows = document.querySelectorAll(`[data-date-group="${date}"]`);
                const icon = document.getElementById(`icon-${date}`);
                if (collapse) { rows.forEach(r => r.classList.add('hidden-row')); icon.innerText = '▶'; } 
                else { rows.forEach(r => r.classList.remove('hidden-row')); icon.innerText = '▼'; }
            });
        }

        function render() {
            localStorage.setItem('obsidian_intel_v8', JSON.stringify(trades));
            const body = document.getElementById('tradeBody');
            body.innerHTML = '';
            const today = getNYDate();
            const groups = {};
            trades.forEach(t => { if (!groups[t.date]) groups[t.date] = []; groups[t.date].push(t); });
            const sortedDates = Object.keys(groups).sort().reverse();
            sortedDates.forEach(date => {
                const dayName = groups[date][0].day;
                const dailyTotal = groups[date].reduce((sum, t) => sum + parseFloat(t.pnl), 0);
                const isToday = date === today;
                body.innerHTML += `
                    <tr class="group-header" onclick="toggleGroup('${date}')">
                        <td colspan="7" class="p-4 text-[12px] font-black uppercase tracking-widest text-cyan-400">
                            <span id="icon-${date}" class="mr-3">${isToday ? '▼' : '▶'}</span> ${date} — ${dayName} ${isToday ? '' : '🔒'}
                        </td>
                        <td class="p-4 text-right text-[12px] font-black ${dailyTotal >= 0 ? 'text-green-400' : 'text-red-500'}">
                            DAY NET: $${dailyTotal.toLocaleString()}
                        </td>
                        <td colspan="2"></td>
                    </tr>`;
                groups[date].forEach(t => {
                    const pnlCol = parseFloat(t.pnl) >= 0 ? 'text-green-400' : 'text-red-500';
                    const pct = t.pnlPct || (((t.exit - t.entry) / t.entry) * 100).toFixed(2);
                    body.innerHTML += `
                        <tr data-date-group="${date}" class="border-b border-gray-800 hover:bg-white/5 transition ${isToday ? '' : 'hidden-row'}">
                            <td class="p-5"><div class="text-cyan-400 text-xl font-bold">${t.stock}</div><div class="${t.option === 'C' ? 'text-green-500' : 'text-red-500'} text-xs uppercase font-black mt-1">${t.option === 'C' ? 'CALL' : 'PUT'}</div></td>
                            <td class="p-5 text-white trade-text">${t.entry} → ${t.exit} <span class="text-gray-600 ml-1">(${t.count}x)</span></td>
                            <td class="p-5 text-gray-400 trade-text">${t.vwap || '-'}</td>
                            <td class="p-5">${t.ema512 ? `<span class="px-3 py-1.5 rounded text-[11px] font-black ${t.ema512 === 'BUY' ? 'bg-green-900 text-green-300' : 'bg-red-900 text-red-300'}">${t.ema512}</span>` : '-'}</td>
                            <td class="p-5">${t.ema3450 ? `<span class="px-3 py-1.5 rounded text-[11px] font-black ${t.ema3450 === 'Buy' ? 'bg-green-900 text-green-300' : 'bg-red-900 text-red-300'}">${t.ema3450}</span>` : '-'}</td>
                            <td class="p-5 text-blue-400 font-bold trade-text">${t.mtf || '-'}</td>
                            <td class="p-5"><span class="bg-blue-900/40 text-blue-300 px-3 py-1.5 rounded text-[11px] font-black">${t.setup}</span></td>
                            <td class="p-5 text-right pnl-text ${pnlCol}">$${parseFloat(t.pnl).toLocaleString()}</td>
                            <td class="p-5 text-right pnl-text ${pnlCol}">${pct}%</td>
                            <td class="p-5 text-center">
                                ${isToday ? `<button onclick="remove('${t.id}')" class="text-red-500 hover:text-white text-lg">🗑</button>` : `<span class="locked-badge" title="Historical data is locked">🔒</span>`}
                            </td>
                        </tr>`;
                });
            });
            updateAnalytics();
        }

        document.getElementById('tradeForm').onsubmit = (e) => {
            e.preventDefault();
            const entry = parseFloat(document.getElementById('entry').value);
            const exit = parseFloat(document.getElementById('exit').value);
            const count = parseInt(document.getElementById('count').value);
            const dateVal = document.getElementById('date').value;
            const getOptionalToggle = (id) => {
                const el = document.querySelector(`.toggle-group[data-id="${id}"] .active`);
                return el ? el.dataset.val : null;
            };
            const pnlVal = (exit - entry) * 100 * count;
            const pnlPercent = ((exit - entry) / entry * 100).toFixed(2);
            trades.unshift({
                id: Date.now(), date: dateVal, day: new Date(dateVal.replace(/-/g, '/')).toLocaleDateString('en-US', { weekday: 'long' }),
                stock: document.getElementById('stock').value, option: document.getElementById('optionType').value,
                count, entry, exit, vwap: getOptionalToggle('vwap'), ema512: getOptionalToggle('ema512'), ema3450: getOptionalToggle('ema3450'),
                mtf: getOptionalToggle('mtf'), pmRange: getOptionalToggle('pmRange'), pdRange: getOptionalToggle('pdRange'),
                pdc: getOptionalToggle('pdc'), setup: document.getElementById('setup').value, pnl: pnlVal.toFixed(2), pnlPct: pnlPercent
            });
            render(); e.target.reset(); document.getElementById('date').value = getNYDate();
            document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
        };

        function remove(id) { if(confirm("Delete trade?")) { trades = trades.filter(t => String(t.id) !== String(id)); render(); } }
        function exportCSV() {
            let csv = "Date,Day,Stock,Option,Qty,Entry,Exit,PNL,PNL%\n";
            trades.forEach(t => {
                const pct = t.pnlPct || (((t.exit - t.entry) / t.entry) * 100).toFixed(2);
                csv += `${t.date},${t.day},${t.stock},${t.option},${t.count},${t.entry},${t.exit},${t.pnl},${pct}%\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const a = document.createElement('a'); a.href = window.URL.createObjectURL(blob); a.download = `Obsidian_Elite_Log.csv`; a.click();
        }

        window.onload = () => {
            const ny = getNYDate(); document.getElementById('date').value = ny;
            document.getElementById('currentDateDisplay').innerText = ny;
            initChart(); render();
        };
    </script>
</body>
</html>

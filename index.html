<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Obsidian Elite | High-Frequency Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #030508; color: #ffffff; font-family: 'JetBrains Mono', monospace; }
        .stat-card { background: #0a0e14; border: 1px solid #1f2937; border-radius: 12px; }
        
        /* Updated Label Color for better readability */
        label { color: #e2e8f0; font-weight: 800; font-size: 11px; text-transform: uppercase; margin-bottom: 8px; display: block; letter-spacing: 0.05em; }
        
        input { background-color: #0d1117; border: 1px solid #30363d; color: #fff; padding: 10px; border-radius: 8px; font-size: 14px; width: 100%; outline: none; }
        input:focus { border-color: #00f2ff; }
        
        .grid-selector { display: grid; grid-template-columns: repeat(auto-fill, minmax(65px, 1fr)); gap: 4px; }
        .grid-btn { background: #161b22; border: 1px solid #30363d; padding: 8px 2px; font-size: 10px; font-weight: 800; border-radius: 6px; cursor: pointer; text-align: center; color: #94a3b8; transition: 0.2s; }
        .grid-btn.active { background: #1e3a8a; color: #60a5fa; border-color: #60a5fa; }
        .grid-btn.type-btn.active[data-val="CALL"] { background: #064e3b; color: #4ade80; border-color: #4ade80; }
        .grid-btn.type-btn.active[data-val="PUT"] { background: #7f1d1d; color: #f87171; border-color: #f87171; }
        .add-custom { color: #00f2ff; border: 1px dashed #00f2ff; background: transparent; }

        .toggle-group { display: flex; gap: 4px; background: #161b22; padding: 4px; border-radius: 8px; border: 1px solid #30363d; }
        .toggle-btn { flex: 1; text-align: center; padding: 8px 2px; font-size: 10px; font-weight: 800; border-radius: 6px; cursor: pointer; color: #94a3b8; }
        .toggle-btn.active[data-val="Y"], .toggle-btn.active[data-val="BUY"], .toggle-btn.active[data-val="Above"] { background: #064e3b; color: #4ade80; }
        .toggle-btn.active[data-val="N"], .toggle-btn.active[data-val="SELL"], .toggle-btn.active[data-val="Below"] { background: #7f1d1d; color: #f87171; }
        .toggle-btn.active.blue { background: #1e3a8a; color: #60a5fa; }

        .btn-live { background: linear-gradient(to bottom, #00f2ff, #0077ff); color: white; padding: 14px; font-weight: 800; border-radius: 10px; width: 100%; text-transform: uppercase; }
        .btn-close { background: linear-gradient(to bottom, #f59e0b, #d97706); color: white; padding: 14px; font-weight: 800; border-radius: 10px; width: 100%; text-transform: uppercase; }
        .status-live { color: #00f2ff; animation: pulse 2s infinite; font-weight: 800; font-size: 10px; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .error-glow { border: 1px solid #ef4444 !important; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-[1850px] mx-auto">
        <div class="flex justify-between items-start mb-6">
            <div>
                <h1 class="text-3xl font-black text-cyan-400 uppercase tracking-tighter">Obsidian <span class="text-white">Elite</span></h1>
                <p class="text-[10px] font-bold text-gray-500 mt-1 uppercase tracking-widest">Execution Engine | NY: <span id="currentDateDisplay" class="text-cyan-400"></span></p>
            </div>
            <div class="flex gap-4">
                <div class="stat-card px-8 py-3 text-center"><p class="text-gray-500 text-[10px] font-black uppercase">Net P&L</p><p id="totalPnl" class="text-2xl font-black text-green-400">$0.00</p></div>
                <div class="stat-card px-8 py-3 text-center"><p class="text-gray-500 text-[10px] font-black uppercase">Active</p><p id="activeCount" class="text-2xl font-black text-cyan-400">0</p></div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
            <div class="lg:col-span-2 stat-card p-4 h-[300px]">
                <canvas id="pnlChart"></canvas>
            </div>
            <div class="stat-card p-6 flex flex-col justify-around">
                <div>
                    <label>Win Ratio</label>
                    <div class="w-full bg-gray-800 rounded-full h-2 mt-2">
                        <div id="winRatioBar" class="bg-cyan-500 h-2 rounded-full" style="width: 0%"></div>
                    </div>
                    <p id="winRatioText" class="text-right text-xs mt-1 font-bold">0%</p>
                </div>
                <div>
                    <label>Profit Factor</label>
                    <p id="profitFactorText" class="text-3xl font-black text-white">0.00</p>
                </div>
            </div>
        </div>

        <div id="formContainer" class="stat-card p-8 mb-10 border-t-4 border-t-cyan-500">
            <form id="tradeForm" class="grid grid-cols-1 md:grid-cols-4 lg:grid-cols-6 gap-6">
                <input type="hidden" id="editId" value="">
                
                <div class="md:col-span-2 flex flex-col">
                    <label>Select Ticker</label>
                    <div class="grid-selector" id="tickerGrid">
                        <div class="grid-btn" data-val="AAPL">AAPL</div><div class="grid-btn" data-val="AMD">AMD</div>
                        <div class="grid-btn" data-val="COIN">COIN</div><div class="grid-btn" data-val="GOOG">GOOG</div>
                        <div class="grid-btn" data-val="META">META</div><div class="grid-btn" data-val="MSFT">MSFT</div>
                        <div class="grid-btn" data-val="MSTR">MSTR</div><div class="grid-btn" data-val="MU">MU</div>
                        <div class="grid-btn" data-val="NFLX">NFLX</div><div class="grid-btn" data-val="NVDA">NVDA</div>
                        <div class="grid-btn" data-val="PLTR">PLTR</div><div class="grid-btn" data-val="SPX">SPX</div>
                        <div class="grid-btn" data-val="SPY">SPY</div><div class="grid-btn" data-val="TSLA">TSLA</div>
                        <button type="button" class="grid-btn add-custom" onclick="addCustomTicker()">+ NEW</button>
                    </div>
                </div>

                <div class="flex flex-col">
                    <label>Option Type</label>
                    <div class="grid-selector" data-id="optionType">
                        <div class="grid-btn type-btn" data-val="CALL">CALL</div>
                        <div class="grid-btn type-btn" data-val="PUT">PUT</div>
                    </div>
                </div>

                <div class="flex flex-col"><label>Qty</label><input type="number" id="count" value="1"></div>
                <div class="flex flex-col"><label>Entry Price</label><input type="number" id="entry" step="0.01" required placeholder="0.00"></div>
                <div class="flex flex-col"><label>Exit Price</label><input type="number" id="exit" step="0.01" disabled placeholder="Locked"></div>

                <div class="flex flex-col"><label>Setup</label><div class="grid-selector" data-id="setup"><div class="grid-btn" data-val="A+">A+</div><div class="grid-btn" data-val="B">B</div><div class="grid-btn" data-val="C">C</div></div></div>
                <div class="flex flex-col"><label>VWAP</label><div class="toggle-group" data-id="vwap"><div class="toggle-btn" data-val="Y">Y</div><div class="toggle-btn" data-val="N">N</div></div></div>
                <div class="flex flex-col"><label>EMA 5/12</label><div class="toggle-group" data-id="ema512"><div class="toggle-btn" data-val="BUY">BUY</div><div class="toggle-btn" data-val="SELL">SELL</div></div></div>
                <div class="flex flex-col"><label>MTF</label><div class="toggle-group" data-id="mtf"><div class="toggle-btn blue" data-val="H34">H34</div><div class="toggle-btn blue" data-val="21">21</div><div class="toggle-btn blue" data-val="55">55</div></div></div>
                <div class="flex flex-col"><label>PM Range</label><div class="toggle-group" data-id="pmRange"><div class="toggle-btn" data-val="HI">HI</div><div class="toggle-btn" data-val="LO">LO</div></div></div>
                <div class="flex flex-col"><label>PD Range</label><div class="toggle-group" data-id="pdRange"><div class="toggle-btn" data-val="HI">HI</div><div class="toggle-btn" data-val="LO">LO</div></div></div>

                <div class="col-span-full mt-4">
                    <button type="submit" id="submitBtn" class="btn-live">Record Daily Execution</button>
                    <button type="button" id="cancelEdit" onclick="resetForm()" class="hidden bg-gray-800 px-8 py-3 rounded-xl font-black text-xs uppercase ml-4">Cancel</button>
                </div>
            </form>
        </div>

        <div class="stat-card overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-900/50 uppercase">
                    <tr>
                        <th class="p-5 text-[10px] text-gray-500">Asset Details</th>
                        <th class="p-5 text-[10px] text-gray-500">Timeline</th>
                        <th class="p-5 text-[10px] text-gray-500">Fills</th>
                        <th class="p-5 text-[10px] text-gray-500 text-right">PNL ($)</th>
                        <th class="p-5 text-[10px] text-gray-500 text-right">PNL (%)</th>
                        <th class="p-5 text-[10px] text-gray-500 text-center">Manage</th>
                    </tr>
                </thead>
                <tbody id="tradeBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let trades = JSON.parse(localStorage.getItem('obsidian_elite_v8')) || [];
        let pnlChart = null;

        function getNYTime() { return new Date().toLocaleTimeString("en-US", {timeZone: "America/New_York", hour12: false}); }
        function getNYDate() { return new Date(new Date().toLocaleString("en-US", {timeZone: "America/New_York"})).toISOString().split('T')[0]; }

        // Chart Initialization
        function initChart() {
            const ctx = document.getElementById('pnlChart').getContext('2d');
            pnlChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Daily PnL',
                        data: [],
                        backgroundColor: '#22d3ee',
                        borderRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#1f2937' }, ticks: { color: '#94a3b8' } },
                        x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        // Update Stats and Chart
        function updateAnalytics() {
            const closedTrades = trades.filter(t => t.status === 'CLOSED');
            const totalWins = closedTrades.filter(t => parseFloat(t.pnl) > 0).length;
            const winRatio = closedTrades.length > 0 ? (totalWins / closedTrades.length * 100).toFixed(0) : 0;
            
            document.getElementById('winRatioBar').style.width = `${winRatio}%`;
            document.getElementById('winRatioText').innerText = `${winRatio}%`;

            // Profit Factor
            const grossProfit = closedTrades.filter(t => parseFloat(t.pnl) > 0).reduce((sum, t) => sum + parseFloat(t.pnl), 0);
            const grossLoss = Math.abs(closedTrades.filter(t => parseFloat(t.pnl) < 0).reduce((sum, t) => sum + parseFloat(t.pnl), 0));
            const pf = grossLoss > 0 ? (grossProfit / grossLoss).toFixed(2) : grossProfit > 0 ? "Infinity" : "0.00";
            document.getElementById('profitFactorText').innerText = pf;

            // Chart Data
            const dailyData = {};
            closedTrades.forEach(t => {
                dailyData[t.date] = (dailyData[t.date] || 0) + parseFloat(t.pnl);
            });
            
            const labels = Object.keys(dailyData).sort();
            pnlChart.data.labels = labels;
            pnlChart.data.datasets[0].data = labels.map(l => dailyData[l]);
            pnlChart.update();
        }

        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('grid-btn') || e.target.classList.contains('toggle-btn')) {
                const group = e.target.closest('.grid-selector') || e.target.closest('.toggle-group');
                if (group) {
                    group.querySelectorAll('.grid-btn, .toggle-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    group.classList.remove('error-glow');
                }
            }
        });

        function addCustomTicker() {
            const ticker = prompt("Enter Ticker Symbol:").toUpperCase();
            if (ticker) {
                const btn = document.createElement('div');
                btn.className = 'grid-btn active';
                btn.dataset.val = ticker;
                btn.innerText = ticker;
                document.getElementById('tickerGrid').insertBefore(btn, document.querySelector('.add-custom'));
            }
        }

        function calculateDuration(start, end) {
            if (!start || !end) return "--";
            const s = start.split(':'), e = end.split(':');
            const diff = (parseInt(e[0])*3600 + parseInt(e[1])*60 + parseInt(e[2])) - (parseInt(s[0])*3600 + parseInt(s[1])*60 + parseInt(s[2]));
            return diff < 0 ? "--" : `${Math.floor(diff/60)}m ${diff%60}s`;
        }

        function render() {
            localStorage.setItem('obsidian_elite_v8', JSON.stringify(trades));
            const body = document.getElementById('tradeBody'); body.innerHTML = '';
            let total = 0, active = 0;
            const groups = {};
            
            trades.forEach(t => {
                if (!groups[t.date]) groups[t.date] = []; groups[t.date].push(t);
                if (t.status === 'OPEN') active++;
                if (t.status === 'CLOSED') total += parseFloat(t.pnl);
            });

            document.getElementById('activeCount').innerText = active;
            document.getElementById('totalPnl').innerText = `$${total.toLocaleString(undefined, {minimumFractionDigits:2})}`;
            document.getElementById('totalPnl').className = `text-2xl font-black ${total >= 0 ? 'text-green-400' : 'text-red-500'}`;

            Object.keys(groups).sort().reverse().forEach(date => {
                body.innerHTML += `<tr class="bg-gray-900/40"><td colspan="6" class="p-3 text-[10px] font-black text-cyan-400 uppercase tracking-widest border-l-4 border-cyan-500">${date}</td></tr>`;
                groups[date].forEach(t => {
                    const isC = t.status === 'CLOSED';
                    body.innerHTML += `
                        <tr class="border-b border-gray-800/50 hover:bg-white/5 transition">
                            <td class="p-5">
                                <div class="text-lg font-black text-white">${t.stock} <span class="${t.option === 'CALL' ? 'text-green-500' : 'text-red-500'}">${t.option}</span></div>
                                <div class="${isC ? 'text-gray-600' : 'status-live'} uppercase text-[9px] font-black">${t.status}</div>
                            </td>
                            <td class="p-5">
                                <div class="text-white text-xs font-bold">${t.entryTime} → ${t.exitTime || '--'}</div>
                                <div class="text-cyan-500 text-[9px] font-black mt-1">DUR: ${isC ? calculateDuration(t.entryTime, t.exitTime) : '--'}</div>
                            </td>
                            <td class="p-5 text-white font-bold text-sm">${t.entry} → ${t.exit || '???'} <span class="text-gray-600">(${t.count}x)</span></td>
                            <td class="p-5 text-right font-black ${parseFloat(t.pnl) >= 0 ? 'text-green-400' : 'text-red-500'}">${isC ? '$' + parseFloat(t.pnl).toLocaleString() : '--'}</td>
                            <td class="p-5 text-right font-black ${parseFloat(t.pnl) >= 0 ? 'text-green-400' : 'text-red-500'}">${isC ? t.pnlPct + '%' : '--'}</td>
                            <td class="p-5 text-center">${!isC ? `<button onclick="prepareClose('${t.id}')" class="bg-orange-500 text-white px-4 py-2 rounded font-black text-[10px] uppercase">Close Trade</button>` : `<button onclick="remove('${t.id}')" class="text-red-500">🗑</button>`}</td>
                        </tr>`;
                });
            });
            updateAnalytics();
        }

        document.getElementById('tradeForm').onsubmit = (e) => {
            e.preventDefault();
            const editId = document.getElementById('editId').value;
            const getActive = (id) => { const el = document.querySelector(`[data-id="${id}"] .active`); return el ? el.dataset.val : null; };
            const ticker = document.querySelector('#tickerGrid .active')?.dataset.val;
            const type = getActive('optionType');

            if (!ticker || !type) { alert("Select Ticker and Option Type!"); return; }

            if (!editId) {
                trades.unshift({
                    id: Date.now(), date: getNYDate(), status: 'OPEN',
                    stock: ticker, option: type, count: document.getElementById('count').value, 
                    entry: parseFloat(document.getElementById('entry').value), entryTime: getNYTime(), 
                    exit: null, exitTime: null, pnl: 0, pnlPct: 0,
                    setup: getActive('setup'), vwap: getActive('vwap'), ema512: getActive('ema512'), mtf: getActive('mtf'), pmRange: getActive('pmRange'), pdRange: getActive('pdRange')
                });
            } else {
                const idx = trades.findIndex(t => String(t.id) === String(editId));
                const ex = parseFloat(document.getElementById('exit').value);
                const en = trades[idx].entry;
                trades[idx].status = 'CLOSED'; trades[idx].exit = ex; trades[idx].exitTime = getNYTime();
                trades[idx].pnl = ((ex - en) * 100 * trades[idx].count).toFixed(2);
                trades[idx].pnlPct = (((ex - en) / en) * 100).toFixed(2);
                ['setup', 'vwap','ema512','mtf','pmRange','pdRange'].forEach(k => trades[idx][k] = getActive(k));
            }
            resetForm(); render();
        };

        function prepareClose(id) {
            const t = trades.find(tr => String(tr.id) === String(id));
            document.getElementById('editId').value = t.id;
            document.getElementById('entry').value = t.entry;
            document.getElementById('exit').disabled = false;
            document.getElementById('exit').focus();
            document.getElementById('submitBtn').innerText = "Finalize Exit (Mandatory Fields)";
            document.getElementById('submitBtn').className = "btn-close";
            document.getElementById('cancelEdit').classList.remove('hidden');
        }

        function resetForm() {
            document.getElementById('tradeForm').reset();
            document.querySelectorAll('.active').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.error-glow').forEach(g => g.classList.remove('error-glow'));
            document.getElementById('editId').value = ""; document.getElementById('exit').disabled = true;
            document.getElementById('submitBtn').innerText = "Record Daily Execution";
            document.getElementById('submitBtn').className = "btn-live";
            document.getElementById('cancelEdit').classList.add('hidden');
        }

        function remove(id) { if(confirm("Delete trade?")) { trades = trades.filter(t => String(t.id) !== String(id)); render(); } }
        
        window.onload = () => { 
            document.getElementById('currentDateDisplay').innerText = getNYDate(); 
            initChart();
            render(); 
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Obsidian Elite | Quant Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #030508; color: #ffffff; font-family: 'JetBrains Mono', monospace; }
        .stat-card { background: linear-gradient(145deg, #0a0e14 0%, #06090c 100%); border: 1px solid #1f2937; border-radius: 16px; position: relative; overflow: hidden; }
        .stat-card::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, #00f2ff, transparent); opacity: 0.3; }
        
        label { color: #94a3b8; font-weight: 800; font-size: 10px; text-transform: uppercase; margin-bottom: 8px; display: block; letter-spacing: 0.1em; }
        input, select { background-color: #0d1117; border: 1px solid #30363d; color: #fff; padding: 10px; border-radius: 8px; font-size: 14px; width: 100%; outline: none; }
        input:focus { border-color: #00f2ff; box-shadow: 0 0 10px rgba(0, 242, 255, 0.1); }
        
        .gauge-container { position: relative; height: 140px; width: 140px; }
        .gauge-value { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.5rem; color: #00f2ff; text-shadow: 0 0 10px rgba(0, 242, 255, 0.5); }
        
        .metric-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .metric-label { font-size: 10px; font-weight: 700; color: #64748b; text-transform: uppercase; }
        .metric-val { font-size: 14px; font-weight: 800; }
        
        .cmd-input { border: 2px solid #1f2937; background: #05070a; font-size: 16px; color: #00f2ff; padding: 15px; border-radius: 12px; width: 100%; }
        .toggle-group { display: flex; gap: 4px; background: #161b22; padding: 4px; border-radius: 8px; border: 1px solid #30363d; flex-wrap: wrap; }
        .toggle-btn { flex: 1; min-width: 60px; text-align: center; padding: 8px 4px; font-size: 10px; font-weight: 800; border-radius: 6px; cursor: pointer; color: #4b5563; transition: 0.2s; background: #0d1117; border: 1px solid #30363d; }
        
        .toggle-btn.active { border-color: #00f2ff; color: #fff; }
        .toggle-btn.active[data-type="CALL"] { background: #064e3b; color: #4ade80; }
        .toggle-btn.active[data-type="PUT"] { background: #7f1d1d; color: #f87171; }
        .toggle-btn.active[data-val="Y"], .toggle-btn.active[data-val="BUY"], .toggle-btn.active[data-val="Above"], .toggle-btn.active[data-val="HI"] { background: #064e3b; color: #4ade80; }
        .toggle-btn.active[data-val="N"], .toggle-btn.active[data-val="SELL"], .toggle-btn.active[data-val="Below"], .toggle-btn.active[data-val="LO"] { background: #7f1d1d; color: #f87171; }
        .toggle-btn.active.blue { background: #1e3a8a; color: #60a5fa; }

        .btn-live { background: linear-gradient(to bottom, #00f2ff, #0077ff); color: white; padding: 14px; font-weight: 800; border-radius: 10px; width: 100%; text-transform: uppercase; cursor: pointer; }
        .btn-close { background: linear-gradient(to bottom, #f59e0b, #d97706); color: white; padding: 14px; font-weight: 800; border-radius: 10px; width: 100%; text-transform: uppercase; }
        .status-pill { padding: 2px 8px; border-radius: 4px; font-size: 9px; font-weight: 900; }
        .pill-open { border: 1px solid #00f2ff; color: #00f2ff; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body class="p-6">
    <div class="max-w-[1850px] mx-auto">
        <div class="flex justify-between items-end mb-8">
            <div>
                <h1 class="text-3xl font-black text-cyan-400 uppercase tracking-tighter">Obsidian <span class="text-white">Elite</span></h1>
                <p class="text-[10px] font-bold text-gray-500 mt-1 uppercase tracking-widest">Quant Terminal | NY: <span id="currentDateDisplay" class="text-cyan-400"></span></p>
            </div>
            <div class="flex gap-6">
                <div class="text-right"><p class="text-gray-500 text-[10px] font-black uppercase">Net P&L</p><p id="totalPnl" class="text-3xl font-black text-green-400">$0.00</p></div>
                <div class="text-right border-l border-gray-800 pl-6"><p class="text-gray-500 text-[10px] font-black uppercase">Exposure</p><p id="activeCount" class="text-3xl font-black text-cyan-400">0</p></div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 mb-8">
            <div class="lg:col-span-2 stat-card p-6 h-[300px]"><label>Equity Curve</label><canvas id="dailyPnlChart"></canvas></div>
            <div class="stat-card p-6 h-[300px] flex flex-col items-center justify-center">
                <label class="self-start">Execution Precision</label>
                <div class="gauge-container"><canvas id="winLossChart"></canvas><div class="gauge-value" id="winRatioPercent">0%</div></div>
            </div>
            <div class="stat-card p-6 h-[300px]">
                <label>Efficiency Matrix</label>
                <div class="metric-row"><span class="metric-label">Profit Factor</span><span id="profitFactor" class="metric-val text-cyan-400">0.00</span></div>
                <div class="metric-row"><span class="metric-label">Avg Win Hold</span><span id="avgWinTime" class="metric-val text-green-400">--</span></div>
                <div class="metric-row"><span class="metric-label">Avg Loss Hold</span><span id="avgLossTime" class="metric-val text-red-500">--</span></div>
            </div>
        </div>

        <div class="mb-6"><label>Elite Command Line</label><input type="text" id="cmdInput" class="cmd-input" placeholder="TSLA C 5 1.50"></div>

        <div id="formContainer" class="stat-card p-8 mb-10 border-t-4 border-t-cyan-500">
            <form id="tradeForm" class="grid grid-cols-1 md:grid-cols-4 lg:grid-cols-6 gap-6">
                <input type="hidden" id="editId" value="">
                <div class="col-span-2">
                    <label>Select Ticker</label>
                    <div class="toggle-group" id="tickerSelect">
                        <div class="toggle-btn" data-ticker="SPY">SPY</div><div class="toggle-btn" data-ticker="SPX">SPX</div>
                        <div class="toggle-btn" data-ticker="TSLA">TSLA</div><div class="toggle-btn" data-ticker="NVDA">NVDA</div>
                        <div class="toggle-btn" data-ticker="AAPL">AAPL</div><div class="toggle-btn" data-ticker="AMD">AMD</div>
                        <div class="toggle-btn" data-ticker="META">META</div><div class="toggle-btn" data-ticker="QQQ">QQQ</div>
                    </div>
                </div>
                <div>
                    <label>Option Type</label>
                    <div class="toggle-group" id="typeSelect">
                        <div class="toggle-btn" data-type="CALL">CALL</div><div class="toggle-btn" data-type="PUT">PUT</div>
                    </div>
                </div>
                <div><label>Qty</label><input type="number" id="count" value="1"></div>
                <div><label>Entry</label><input type="number" id="entry" step="0.01"></div>
                <div><label>Exit</label><input type="number" id="exit" step="0.01" placeholder="Locked" disabled></div>
                
                <div class="col-span-full grid grid-cols-2 md:grid-cols-6 gap-4">
                    <div><label>Setup</label><select id="setup"><option>None</option><option>A+</option><option>V-Rev</option></select></div>
                    <div><label>VWAP</label><div class="toggle-group" data-id="vwap"><div class="toggle-btn" data-val="Y">Y</div><div class="toggle-btn" data-val="N">N</div></div></div>
                    <div><label>EMA 5/12</label><div class="toggle-group" data-id="ema5"><div class="toggle-btn" data-val="BUY">B</div><div class="toggle-btn" data-val="SELL">S</div></div></div>
                </div>

                <div class="col-span-full flex gap-4">
                    <button type="submit" id="submitBtn" class="btn-live">Open Live Trade</button>
                    <button type="button" id="cancelBtn" onclick="resetForm()" class="hidden bg-gray-800 p-4 rounded-lg font-bold">Cancel</button>
                </div>
            </form>
        </div>

        <div class="stat-card overflow-hidden">
            <table class="w-full text-left text-xs">
                <thead class="bg-gray-900/50 uppercase text-gray-500">
                    <tr><th class="p-5">Asset</th><th class="p-5">Timeline</th><th class="p-5">Fills</th><th class="p-5 text-right">PNL ($)</th><th class="p-5 text-center">Manage</th></tr>
                </thead>
                <tbody id="tradeBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let trades = JSON.parse(localStorage.getItem('obsidian_elite_v8')) || [];
        let pnlChart, winLossChart;

        function initCharts() {
            pnlChart = new Chart(document.getElementById('dailyPnlChart'), { type: 'bar', data: { labels: [], datasets: [{ data: [], backgroundColor: '#00f2ff' }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: false } } });
            winLossChart = new Chart(document.getElementById('winLossChart'), { type: 'doughnut', data: { labels: ['W', 'L'], datasets: [{ data: [0, 0], backgroundColor: ['#4ade80', '#f87171'], cutout: '85%' }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: false } } });
        }

        function render() {
            localStorage.setItem('obsidian_elite_v8', JSON.stringify(trades));
            const body = document.getElementById('tradeBody'); body.innerHTML = '';
            let total = 0, active = 0;
            
            trades.forEach((t, i) => {
                if (t.status === 'OPEN') active++; else total += parseFloat(t.pnl);
                const isC = t.status === 'CLOSED';
                body.innerHTML += `
                    <tr class="border-b border-gray-800/50">
                        <td class="p-5"><span class="font-black">${t.stock}</span> <span class="${t.option === 'CALL' ? 'text-green-500' : 'text-red-500'}">${t.option}</span></td>
                        <td class="p-5 text-gray-400">${t.entryTime} → ${t.exitTime || '--'}</td>
                        <td class="p-5">${t.entry} → ${t.exit || '??'}</td>
                        <td class="p-5 text-right font-black ${parseFloat(t.pnl) >= 0 ? 'text-green-400' : 'text-red-500'}">${isC ? '$'+t.pnl : '--'}</td>
                        <td class="p-5 text-center flex justify-center gap-3">
                            <button onclick="editTrade(${i})" class="text-cyan-400">✏️</button>
                            <button onclick="removeTrade(${i})" class="text-red-500">🗑️</button>
                            ${!isC ? `<button onclick="closeTradeUI(${i})" class="bg-orange-500 text-white px-2 py-1 rounded text-[10px]">CLOSE</button>` : ''}
                        </td>
                    </tr>`;
            });
            document.getElementById('activeCount').innerText = active;
            document.getElementById('totalPnl').innerText = '$' + total.toFixed(2);
            updateAnalytics();
        }

        // Ticker & Type selection
        document.querySelectorAll('.toggle-btn').forEach(btn => {
            btn.onclick = function() {
                this.parentElement.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            };
        });

        document.getElementById('tradeForm').onsubmit = (e) => {
            e.preventDefault();
            const editId = document.getElementById('editId').value;
            const ticker = document.querySelector('#tickerSelect .active')?.dataset.ticker;
            const type = document.querySelector('#typeSelect .active')?.dataset.type;
            
            if(!ticker || !type) return alert("Select Ticker and Type!");

            const tradeData = {
                stock: ticker, option: type, count: document.getElementById('count').value,
                entry: parseFloat(document.getElementById('entry').value), status: 'OPEN',
                entryTime: new Date().toLocaleTimeString(), id: Date.now()
            };

            if(editId) {
                trades[editId] = {...trades[editId], ...tradeData};
                if(document.getElementById('exit').value) {
                    const ex = parseFloat(document.getElementById('exit').value);
                    trades[editId].exit = ex;
                    trades[editId].status = 'CLOSED';
                    trades[editId].exitTime = trades[editId].exitTime || new Date().toLocaleTimeString();
                    trades[editId].pnl = ((ex - trades[editId].entry) * 100 * trades[editId].count).toFixed(2);
                }
            } else trades.unshift(tradeData);
            
            resetForm(); render();
        };

        function editTrade(i) {
            const t = trades[i];
            document.getElementById('editId').value = i;
            document.getElementById('entry').value = t.entry;
            document.getElementById('count').value = t.count;
            document.getElementById('exit').value = t.exit || '';
            document.getElementById('exit').disabled = false;
            document.getElementById('submitBtn').innerText = "Update Record";
            document.getElementById('cancelBtn').classList.remove('hidden');
        }

        function closeTradeUI(i) { editTrade(i); document.getElementById('submitBtn').innerText = "Finalize Exit"; }
        function removeTrade(i) { trades.splice(i, 1); render(); }
        function resetForm() { document.getElementById('tradeForm').reset(); document.getElementById('editId').value = ''; document.getElementById('exit').disabled = true; render(); }
        
        window.onload = () => { initCharts(); render(); };
    </script>
</body>
</html>

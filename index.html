<script>
    let trades = JSON.parse(localStorage.getItem('obsidian_intel_v8')) || [];
    let pnlChart;

    // Toggle Initialization
    document.querySelectorAll('.toggle-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            this.parentElement.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
        });
    });

    function getNYDate() {
        const nyString = new Date().toLocaleString("en-US", {timeZone: "America/New_York"});
        const d = new Date(nyString);
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    function initChart() {
        const ctx = document.getElementById('pnlChart').getContext('2d');
        pnlChart = new Chart(ctx, {
            type: 'bar',
            data: { labels: [], datasets: [{ label: 'Daily Net PNL', data: [], backgroundColor: [] }] },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { 
                    legend: { display: false },
                    tooltip: { callbacks: { label: (ctx) => ` Net: $${ctx.raw.toLocaleString()}` } }
                },
                scales: { 
                    y: { grid: { color: '#1f2937' }, ticks: { color: '#6b7280' } },
                    x: { grid: { display: false }, ticks: { color: '#6b7280' } }
                }
            }
        });
    }

    function updateAnalytics() {
        if (!trades.length) return;
        
        let total = 0, wins = 0, grossWin = 0, grossLoss = 0;
        
        // --- NEW DAILY GROUPING LOGIC ---
        // 1. Group P&L by Date
        const dailyData = {};
        trades.forEach(t => {
            const val = parseFloat(t.pnl);
            total += val;
            if (val > 0) { wins++; grossWin += val; }
            else { grossLoss += Math.abs(val); }

            // Grouping for chart
            if (!dailyData[t.date]) dailyData[t.date] = 0;
            dailyData[t.date] += val;
        });

        // 2. Sort dates and take the last 7 trading days
        const sortedDates = Object.keys(dailyData).sort().slice(-7);
        const dailyValues = sortedDates.map(date => dailyData[date]);
        // --------------------------------

        // Update Top Metrics
        const winRate = ((wins / trades.length) * 100).toFixed(0);
        document.getElementById('totalPnl').innerText = `$${total.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
        document.getElementById('totalPnl').className = `text-2xl font-black ${total >= 0 ? 'text-green-400' : 'text-red-500'}`;
        document.getElementById('winRateDisplay').innerText = `${winRate}%`;
        document.getElementById('tradeCount').innerText = trades.length;

        // Update Progress Bars
        document.getElementById('winBarFill').style.width = `${winRate}%`;
        document.getElementById('winBarText').innerText = `${winRate}%`;
        
        const pf = grossLoss === 0 ? grossWin : (grossWin / grossLoss);
        document.getElementById('pfDisplay').innerText = pf.toFixed(2);
        document.getElementById('pfBarFill').style.width = `${Math.min(pf * 25, 100)}%`;

        // Update Chart with Daily Aggregates
        pnlChart.data.labels = sortedDates.map(d => d.split('-').slice(1).join('/')); // Formats as MM/DD
        pnlChart.data.datasets[0].data = dailyValues;
        pnlChart.data.datasets[0].backgroundColor = dailyValues.map(v => v >= 0 ? '#10b981' : '#ef4444');
        pnlChart.update();
    }

    function render() {
        localStorage.setItem('obsidian_intel_v8', JSON.stringify(trades));
        const body = document.getElementById('tradeBody');
        body.innerHTML = '';

        trades.forEach((t) => {
            const pnlCol = t.pnl >= 0 ? 'text-green-400' : 'text-red-500';
            body.innerHTML += `
                <tr class="border-b border-gray-800 hover:bg-white/5 transition">
                    <td class="p-4 text-gray-500 text-[11px]">${t.date}<br><span class="text-white">${t.day}</span></td>
                    <td class="p-4 text-cyan-400 text-lg">${t.stock}</td>
                    <td class="p-4 ${t.option === 'C' ? 'text-green-500' : 'text-red-500'}">${t.option === 'C' ? 'CALL' : 'PUT'}</td>
                    <td class="p-4 text-white">${t.entry} → ${t.exit} <span class="text-gray-600">(${t.count}x)</span></td>
                    <td class="p-4">${t.vwap}</td>
                    <td class="p-4"><span class="px-2 py-1 rounded text-[10px] ${t.ema512 === 'BUY' ? 'bg-green-900 text-green-300' : 'bg-red-900 text-red-300'}">${t.ema512}</span></td>
                    <td class="p-4"><span class="px-2 py-1 rounded text-[10px] ${t.ema3450 === 'Buy' ? 'bg-green-900 text-green-300' : 'bg-red-900 text-red-300'}">${t.ema3450}</span></td>
                    <td class="p-4 text-blue-400">${t.mtf}</td>
                    <td class="p-4"><span class="bg-blue-900/40 text-blue-300 px-2 py-1 rounded text-[10px]">${t.setup}</span></td>
                    <td class="p-4 text-right text-lg ${pnlCol}">$${parseFloat(t.pnl).toLocaleString()}</td>
                    <td class="p-4 text-center"><button onclick="remove('${t.id}')" class="text-red-500 hover:text-white">🗑</button></td>
                </tr>`;
        });
        updateAnalytics();
    }

    document.getElementById('tradeForm').onsubmit = (e) => {
        e.preventDefault();
        const entry = parseFloat(document.getElementById('entry').value);
        const exit = parseFloat(document.getElementById('exit').value);
        const count = parseInt(document.getElementById('count').value);
        const dateVal = document.getElementById('date').value;
        const getToggle = (id) => document.querySelector(`.toggle-group[data-id="${id}"] .active`).dataset.val;

        trades.

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Obsidian Elite | Quant Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #030508; color: #ffffff; font-family: 'JetBrains Mono', monospace; }
        .stat-card { background: #06090c; border: 1px solid #1f2937; border-radius: 8px; position: relative; }
        label { color: #00FFCC; font-weight: 800; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; display: block; margin-bottom: 10px; }
        input { background: #0d1117; border: 1px solid #30363d; color: #fff; padding: 8px; border-radius: 4px; width: 100%; outline: none; }
        .toggle-group { display: flex; gap: 4px; flex-wrap: wrap; }
        .toggle-btn, .setup-btn { background: #0d1117; border: 1px solid #1f2937; padding: 6px; font-size: 9px; font-weight: 800; border-radius: 4px; cursor: pointer; text-transform: uppercase; color: #4b5563; }
        .toggle-btn.active { background: #1f2937; color: #fff; border-color: #00FFCC; box-shadow: 0 0 10px rgba(0, 255, 204, 0.3); }
        .setup-btn.active { background: #00FFCC; color: #000; border-color: #00FFCC; box-shadow: 0 0 15px rgba(0, 255, 204, 0.5); }
        .btn-live { background: #00FFCC; color: #000; padding: 12px; font-weight: 900; border-radius: 4px; width: 100%; text-transform: uppercase; margin-top: 10px; }
        .group-header { background: #0d1117; cursor: pointer; border-left: 3px solid #00FFCC; }
        thead th { color: #00FFCC; font-size: 9px; text-transform: uppercase; padding: 12px; border-bottom: 1px solid #1f2937; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-[1600px] mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-black text-[#00FFCC]">OBSIDIAN <span class="text-white">ELITE</span></h1>
            <div class="flex gap-8">
                <div class="text-right"><p class="text-[9px] text-[#00FFCC]">NET P&L</p><p id="totalPnl" class="text-2xl font-black">$0.00</p></div>
                <div class="text-right"><p class="text-[9px] text-[#00FFCC]">EXPOSURE</p><p id="activeCount" class="text-2xl font-black">0</p></div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-6">
            <div class="stat-card p-4 h-[220px]"><label>Daily Performance Candles</label><canvas id="equityChart"></canvas></div>
            <div class="stat-card p-4 h-[220px] flex flex-col items-center justify-center">
                <label class="self-start">Precision</label>
                <div class="relative w-28 h-28"><canvas id="precisionChart"></canvas><div class="absolute inset-0 flex items-center justify-center font-black text-[#00FFCC]" id="winRateText">0%</div></div>
            </div>
            <div class="stat-card p-4 h-[220px]"><label>Ticker P&L Range (Peak/Valley)</label><canvas id="tickerChart"></canvas></div>
        </div>

        <div class="stat-card p-6 mb-6">
            <form id="tradeForm" class="grid grid-cols-1 md:grid-cols-6 gap-6">
                <input type="hidden" id="editId">
                <div class="md:col-span-2"><label>Symbol Selection</label><div class="toggle-group" id="tickerSelect"></div></div>
                <div><label>Type</label><div class="toggle-group" id="typeSelect"><div class="toggle-btn" data-type="CALL">CALL</div><div class="toggle-btn" data-type="PUT">PUT</div></div></div>
                <div><label>Qty</label><input type="number" id="count" value="1"></div>
                <div><label>Entry</label><input type="number" id="entry" step="0.01"></div>
                <div><label>Exit</label><input type="number" id="exit" step="0.01" disabled></div>
                <div class="md:col-span-full"><label>Execution Setups</label><div id="setupGrid" class="grid grid-cols-2 md:grid-cols-7 gap-2"></div></div>
                <button type="submit" id="submitBtn" class="md:col-span-full btn-live">Open Live Trade</button>
            </form>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6" id="matrixContainer"></div>

        <div class="stat-card overflow-hidden">
            <table class="w-full text-left text-[11px]">
                <thead class="bg-[#0d1117]">
                    <tr><th>Day / Date</th><th>Asset</th><th>Timeline</th><th>Fills</th><th>Setup Logic</th><th class="text-right">PNL</th><th>Manage</th></tr>
                </thead>
                <tbody id="tradeBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        // Custom Plugin for "Peak/Valley" wicks as seen in original screenshot
        const wickPlugin = { id: 'wickPlugin', afterDatasetsDraw(chart) {
            const { ctx, scales: { y } } = chart;
            const ds = chart.data.datasets.find(d => d.wicks);
            if (!ds) return;
            ctx.save();
            chart.getDatasetMeta(chart.data.datasets.indexOf(ds)).data.forEach((bar, i) => {
                const { h, l } = ds.wicks[i]; if (h === -Infinity) return;
                const x = bar.x;
                ctx.beginPath(); ctx.strokeStyle = '#ffffff55'; ctx.lineWidth = 1;
                ctx.moveTo(x, y.getPixelForValue(h)); ctx.lineTo(x, y.getPixelForValue(l)); ctx.stroke();
                ctx.fillStyle = '#fff'; ctx.font = 'bold 8px JetBrains Mono'; ctx.textAlign = 'center';
                ctx.fillText(`$${Math.round(h)}`, x, y.getPixelForValue(h) - 5);
                ctx.fillText(`$${Math.round(l)}`, x, y.getPixelForValue(l) + 10);
            });
            ctx.restore();
        }};
        Chart.register(wickPlugin);

        let trades = JSON.parse(localStorage.getItem('obsidian_elite_v3')) || [];
        let equityChart, precisionChart, tickerChart;
        const tickers = ["AAPL","AMD","COIN","META","MSTR","MU","NVDA","PLTR","QQQ","SPX","SPY","TSLA"];
        const setups = ["5/12 CURL","5/12 REJECT","34/50 Bounce","34/50 Reject","PM HI break","PM low break","PD CL Bounce","PD CL Fail","PD HI Brko","PD LW Brkdwn","34/50 MTF Bnc","34/50 MTF Rej","50/55 MTF Bnc","50/55 MTF Rej"];

        function initCharts() {
            equityChart = new Chart(document.getElementById('equityChart'), { 
                data: { labels: [], datasets: [{ type: 'bar', data: [], backgroundColor: [], wicks: [] }]},
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false } }, y: { grid: { color: '#1f2937' } } } }
            });
            precisionChart = new Chart(document.getElementById('precisionChart'), { 
                type: 'doughnut', data: { datasets: [{ data: [0, 100], backgroundColor: ['#00FFCC', '#1f2937'], borderWidth: 0, cutout: '85%' }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
            tickerChart = new Chart(document.getElementById('tickerChart'), { 
                type: 'bar', data: { labels: [], datasets: [{ data: [], backgroundColor: [], wicks: [] }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { color: '#fff', font: { size: 8 } } } } }
            });
        }

        function updateAnalytics() {
            const closed = trades.filter(t => t.status === 'CLOSED').sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));
            
            // Ticker Analytics with Peak/Valley Wicks
            let tData = {};
            closed.forEach(t => {
                if (!tData[t.stock]) tData[t.stock] = { val: 0, h: -Infinity, l: Infinity };
                tData[t.stock].val += parseFloat(t.pnl);
                if (tData[t.stock].val > tData[t.stock].h) tData[t.stock].h = tData[t.stock].val;
                if (tData[t.stock].val < tData[t.stock].l) tData[t.stock].l = tData[t.stock].val;
            });
            const keys = Object.keys(tData);
            tickerChart.data.labels = keys;
            tickerChart.data.datasets[0].data = keys.map(k => tData[k].val);
            tickerChart.data.datasets[0].backgroundColor = keys.map(k => tData[k].val >= 0 ? '#4ade80' : '#f87171');
            tickerChart.data.datasets[0].wicks = keys.map(k => ({ h: tData[k].h, l: tData[k].l }));
            tickerChart.update();

            // Precision Gauge Correction
            const wins = closed.filter(t => parseFloat(t.pnl) >= 0).length;
            const rate = closed.length ? Math.round((wins / closed.length) * 100) : 0;
            precisionChart.data.datasets[0].data = [rate, 100 - rate];
            document.getElementById('winRateText').innerText = rate + '%';
            precisionChart.update();

            // Global Totals
            let net = closed.reduce((acc, t) => acc + parseFloat(t.pnl), 0);
            const pnlBox = document.getElementById('totalPnl');
            pnlBox.innerText = `$${net.toFixed(2)}`;
            pnlBox.className = `text-2xl font-black ${net >= 0 ? 'text-green-400' : 'text-red-500'}`;
            document.getElementById('activeCount').innerText = trades.filter(t => t.status === 'OPEN').length;
        }

        function render() {
            localStorage.setItem('obsidian_elite_v3', JSON.stringify(trades));
            const body = document.getElementById('tradeBody'); body.innerHTML = '';
            const now = new Date();
            const groups = { 'Daily': [], 'Weekly': [], 'Monthly': [] };
            
            trades.forEach((t, i) => {
                const d = new Date(t.timestamp); t.idx = i;
                const diff = (now - d) / (1000 * 60 * 60 * 24);
                if (d.toDateString() === now.toDateString()) groups['Daily'].push(t);
                else if (diff <= 7) groups['Weekly'].push(t);
                else groups['Monthly'].push(t);
            });

            ['Daily', 'Weekly', 'Monthly'].forEach(label => {
                if (!groups[label].length) return;
                body.innerHTML += `<tr class="group-header"><td colspan="7" class="p-3 text-[10px] font-black text-[#00FFCC] uppercase">${label} RECAP (${groups[label].length})</td></tr>`;
                groups[label].forEach(t => {
                    const isC = t.status === 'CLOSED';
                    body.innerHTML += `<tr class="border-b border-gray-800">
                        <td class="p-4 text-gray-500">${new Date(t.timestamp).toLocaleDateString([], {weekday:'short', month:'numeric', day:'numeric'})}</td>
                        <td class="p-4 font-bold">${t.stock} <span class="${t.option==='CALL'?'text-green-400':'text-red-400'}">${t.option}</span></td>
                        <td class="p-4 text-gray-600">${t.entryTime} → ${t.exitTime||'--'}</td>
                        <td class="p-4">${t.entry} → ${t.exit||'??'} (${t.count}x)</td>
                        <td class="p-4 text-[#00D9FF]">${t.setups?.join(', ')||'--'}</td>
                        <td class="p-4 text-right font-black ${parseFloat(t.pnl)>=0?'text-green-400':'text-red-500'}">${isC?'$'+t.pnl:'--'}</td>
                        <td class="p-4"><button onclick="editTrade(${t.idx})">✏️</button></td></tr>`;
                });
            });
            updateAnalytics();
        }

        function editTrade(i) {
            const t = trades[i]; document.getElementById('editId').value = i;
            document.getElementById('entry').value = t.entry; document.getElementById('exit').disabled = false;
            document.querySelectorAll('#tickerSelect .toggle-btn').forEach(b => b.classList.toggle('active', b.dataset.ticker === t.stock));
            document.querySelectorAll('#typeSelect .toggle-btn').forEach(b => b.classList.toggle('active', b.dataset.type === t.option));
            document.getElementById('submitBtn').innerText = "Update Record";
        }

        document.getElementById('tradeForm').onsubmit = (e) => {
            e.preventDefault(); const id = document.getElementById('editId').value;
            const tick = document.querySelector('#tickerSelect .active')?.dataset.ticker;
            const type = document.querySelector('#typeSelect .active')?.dataset.type;
            const ent = parseFloat(document.getElementById('entry').value);
            const ext = parseFloat(document.getElementById('exit').value);
            const count = parseInt(document.getElementById('count').value);
            const set = Array.from(document.querySelectorAll('#setupGrid .active')).map(b => b.dataset.val);
            if (id !== "") {
                const t = trades[id];
                if (!isNaN(ext)) { trades[id] = { ...t, exit: ext, status: 'CLOSED', exitTime: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), setups: set, pnl: ((ext - t.entry) * 100 * t.count).toFixed(2) }; }
                else trades[id].setups = set;
            } else {
                trades.unshift({ stock: tick, option: type, entry: ent, count: count, status: 'OPEN', entryTime: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), setups: set, timestamp: new Date().toISOString(), pnl: 0 });
            }
            document.getElementById('tradeForm').reset(); document.getElementById('editId').value = '';
            document.querySelectorAll('.active').forEach(b => b.classList.remove('active'));
            render();
        };

        window.onload = () => {
            tickers.forEach(t => document.getElementById('tickerSelect').innerHTML += `<div class="toggle-btn" data-ticker="${t}">${t}</div>`);
            setups.forEach(s => document.getElementById('setupGrid').innerHTML += `<div class="setup-btn" data-val="${s}">${s}</div>`);
            document.querySelectorAll('.toggle-btn, .setup-btn').forEach(b => b.onclick = function() { 
                if (this.classList.contains('setup-btn')) this.classList.toggle('active');
                else { this.parentElement.querySelectorAll('.toggle-btn').forEach(x => x.classList.remove('active')); this.classList.add('active'); }
            });
            initCharts(); render();
        };
    </script>
</body>
</html>

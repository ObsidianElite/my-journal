<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Obsidian Elite | Quant Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #030508; color: #ffffff; font-family: 'JetBrains Mono', monospace; }
        .stat-card { background: linear-gradient(145deg, #0a0e14 0%, #06090c 100%); border: 1px solid #1f2937; border-radius: 12px; position: relative; overflow: hidden; }
        
        label { 
            color: #00FFCC !important; 
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.8); 
            font-weight: 800; font-size: 11px; text-transform: uppercase; 
            margin-bottom: 8px; display: block; letter-spacing: 0.1em; 
        }

        .metric-sub { font-size: 10px; color: #00FFCC !important; font-weight: 800; text-transform: uppercase; }
        input { background-color: #0d1117; border: 1px solid #30363d; color: #fff; padding: 10px; border-radius: 6px; font-size: 14px; width: 100%; outline: none; }
        input:focus { border-color: #00FFCC; }
        input:disabled { opacity: 0.2; cursor: not-allowed; }
        
        .toggle-group { display: flex; gap: 4px; background: #0a0e14; padding: 4px; border-radius: 8px; border: 1px solid #1f2937; flex-wrap: wrap; }
        .toggle-btn { flex: 1; min-width: 55px; text-align: center; padding: 6px 2px; font-size: 9px; font-weight: 800; border-radius: 4px; cursor: pointer; background: #0d1117; border: 1px solid #1f2937; transition: 0.2s; text-transform: uppercase; }
        .toggle-btn.active { background: var(--brand-color) !important; color: #fff !important; border-color: #fff !important; box-shadow: 0 0 15px var(--brand-color); }

        .setup-btn { flex: 1; min-width: 80px; text-align: center; padding: 10px 6px; font-size: 12px; font-weight: 800; border-radius: 4px; cursor: pointer; color: #00D9FF; background: #0d1117; border: 1px solid #1f2937; transition: 0.2s; text-transform: uppercase; }
        .setup-btn.active { border-color: #00FFCC !important; color: #000 !important; background: #00FFCC !important; box-shadow: 0 0 15px rgba(0, 255, 204, 0.7); }

        .btn-live { background: linear-gradient(to right, #00FFCC, #00D9FF); color: #000; padding: 14px; font-weight: 900; border-radius: 8px; width: 100%; text-transform: uppercase; cursor: pointer; border: none; font-size: 14px; letter-spacing: 1px; }
        .matrix-box { background: #06090c; border: 1px solid #1f2937; border-radius: 8px; padding: 12px; }
        .matrix-title { color: #00FFCC; font-size: 10px; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; }
    </style>
</head>
<body class="p-4 lg:p-8">
    <div class="max-w-[1800px] mx-auto">
        <div class="flex justify-between items-end mb-6">
            <div>
                <h1 class="text-3xl font-black text-[#00FFCC] uppercase tracking-tighter">Obsidian <span class="text-white">Elite</span></h1>
                <p class="text-[10px] font-bold text-gray-400 mt-1 uppercase tracking-widest">Execution Terminal | <span id="currentDateDisplay" class="text-[#00FFCC]"></span></p>
            </div>
            <div class="flex gap-6">
                <div class="text-right"><p class="metric-sub">Net P&L</p><p id="totalPnl" class="text-3xl font-black text-green-400">$40.00</p></div>
                <div class="text-right border-l border-gray-800 pl-6"><p class="metric-sub">Exposure</p><p id="activeCount" class="text-3xl font-black text-[#00D9FF]">0</p></div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-4 mb-6">
            <div class="stat-card p-4 h-[250px]"><label>Daily Performance Curve</label><canvas id="equityChart"></canvas></div>
            <div class="stat-card p-4 h-[250px] flex flex-col items-center justify-center">
                <label>Execution Precision</label>
                <div class="relative w-32 h-32"><canvas id="precisionChart"></canvas><div class="absolute inset-0 flex items-center justify-center"><span id="winRateText" class="text-xl font-black text-[#00FFCC]">67%</span></div></div>
            </div>
            <div class="stat-card p-4 h-[250px] lg:col-span-2"><label>Ticker P&L Range (Peak/Valley)</label><canvas id="tickerChart"></canvas></div>
        </div>

        <div class="stat-card p-6 mb-6 border-t-2 border-t-[#00FFCC]">
            <form id="tradeForm" class="grid grid-cols-1 md:grid-cols-4 lg:grid-cols-6 gap-6">
                <input type="hidden" id="editId" value="">
                <div class="col-span-2">
                    <label>Symbol Selection</label>
                    <div class="toggle-group" id="tickerSelect">
                        <div class="toggle-btn" style="--brand-color: #ED1C24" data-ticker="AMD">AMD</div>
                        <div class="toggle-btn" style="--brand-color: #0052FF" data-ticker="COIN">COIN</div>
                        <div class="toggle-btn" style="--brand-color: #FFD700" data-ticker="SPX">SPX</div>
                        <div class="toggle-btn" style="--brand-color: #00FFCC" data-ticker="SPY">SPY</div>
                    </div>
                </div>
                <div>
                    <label>Contract Type</label>
                    <div class="toggle-group" id="typeSelect">
                        <div class="toggle-btn" style="--brand-color: #4ade80" data-type="CALL">CALL</div>
                        <div class="toggle-btn" style="--brand-color: #f87171" data-type="PUT">PUT</div>
                    </div>
                </div>
                <div><label>Qty</label><input type="number" id="count" value="1" min="1"></div>
                <div><label>Entry Price</label><input type="number" id="entry" step="0.01" placeholder="0.00" required></div>
                <div><label>Exit Price</label><input type="number" id="exit" step="0.01" placeholder="Locked" disabled></div>
                
                <div class="col-span-full">
                    <label>Execution Setup</label>
                    <div id="setupGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-3">
                        <div class="setup-btn" data-val="5/12 CURL">5/12 CURL</div>
                        <div class="setup-btn" data-val="34/50 Bounce">34/50 Bounce</div>
                        <div class="setup-btn" data-val="PM HI break">PM HI break</div>
                        <div class="setup-btn" data-val="PM low break">PM low break</div>
                    </div>
                </div>
                <button type="submit" id="submitBtn" class="col-span-full btn-live">Open Live Trade</button>
            </form>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="matrix-box">
                <div class="matrix-title">Daily Matrix</div>
                <div class="flex justify-between items-center"><span class="text-2xl font-black">3</span><span class="text-[#00FFCC] font-bold">2 - 1</span></div>
            </div>
            <div class="matrix-box">
                <div class="matrix-title">Weekly Matrix</div>
                <div class="flex justify-between items-center"><span class="text-2xl font-black">3</span><span class="text-[#00FFCC] font-bold">2 - 1</span></div>
            </div>
            <div class="matrix-box">
                <div class="matrix-title">Monthly Matrix</div>
                <div class="flex justify-between items-center"><span class="text-2xl font-black">3</span><span class="text-[#00FFCC] font-bold">2 - 1</span></div>
            </div>
        </div>

        <div class="stat-card overflow-x-auto">
            <table class="w-full text-left text-xs">
                <thead class="bg-gray-900/50">
                    <tr class="text-[#00FFCC]">
                        <th class="p-4">DAY / DATE</th><th class="p-4">ASSET</th><th class="p-4">TIMELINE</th><th class="p-4">FILLS</th><th class="p-4">SETUP LOGIC</th><th class="p-4 text-right">PNL</th><th class="p-4 text-center">MANAGE</th>
                    </tr>
                </thead>
                <tbody id="tradeBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let trades = JSON.parse(localStorage.getItem('obsidian_elite_v4')) || [
            { stock: 'COIN', option: 'PUT', entry: 1.5, exit: 1.85, count: 1, status: 'CLOSED', entryTime: '05:14 PM', exitTime: '05:19 PM', setups: ['34/50 Reject'], timestamp: '2026-04-26T21:14:00Z', pnl: 35.00 },
            { stock: 'SPX', option: 'PUT', entry: 2.1, exit: 2.05, count: 1, status: 'CLOSED', entryTime: '04:41 PM', exitTime: '04:42 PM', setups: ['PM low break'], timestamp: '2026-04-26T20:41:00Z', pnl: -5.00 },
            { stock: 'AMD', option: 'CALL', entry: 1.0, exit: 1.1, count: 1, status: 'CLOSED', entryTime: '04:41 PM', exitTime: '04:41 PM', setups: ['MTF 50/55 Rej'], timestamp: '2026-04-26T20:41:00Z', pnl: 10.00 }
        ];

        function render() {
            const body = document.getElementById('tradeBody'); body.innerHTML = '';
            let total = 0;
            trades.forEach((t, i) => {
                const isC = t.status === 'CLOSED';
                if(isC) total += parseFloat(t.pnl);
                body.innerHTML += `
                    <tr class="border-b border-gray-800">
                        <td class="p-4 text-gray-500">Apr 26</td>
                        <td class="p-4 font-bold">${t.stock} <span class="${t.option==='CALL'?'text-green-400':'text-red-400'}">${t.option}</span></td>
                        <td class="p-4 text-gray-400">${t.entryTime} → ${t.exitTime||'--'}</td>
                        <td class="p-4">${t.entry} → ${t.exit||'--'} (${t.count}x)</td>
                        <td class="p-4 text-[#00D9FF]">${t.setups?.join(', ') || '--'}</td>
                        <td class="p-4 text-right font-black ${isC && t.pnl >=0 ? 'text-green-400' : 'text-red-500'}">${isC ? '$'+t.pnl.toFixed(2) : '--'}</td>
                        <td class="p-4 text-center"><button onclick="editTrade(${i})">✏️</button></td>
                    </tr>`;
            });
            document.getElementById('totalPnl').innerText = '$' + total.toFixed(2);
            localStorage.setItem('obsidian_elite_v4', JSON.stringify(trades));
        }

        document.getElementById('tradeForm').onsubmit = (e) => {
            e.preventDefault();
            const entryVal = document.getElementById('entry').value;
            if (!entryVal || parseFloat(entryVal) <= 0) {
                alert("MANDATORY ERROR: Entry Price is required to open a trade.");
                return;
            }
            
            const editId = document.getElementById('editId').value;
            const tick = document.querySelector('#tickerSelect .active')?.dataset.ticker;
            const type = document.querySelector('#typeSelect .active')?.dataset.type;
            const ent = parseFloat(entryVal);
            const ext = parseFloat(document.getElementById('exit').value);
            const setups = Array.from(document.querySelectorAll('#setupGrid .active')).map(b => b.dataset.val);

            if (editId !== "") {
                const t = trades[editId];
                if (!isNaN(ext)) {
                    trades[editId].exit = ext;
                    trades[editId].status = 'CLOSED';
                    trades[editId].exitTime = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                    trades[editId].pnl = (ext - t.entry) * 100 * t.count;
                }
            } else {
                trades.unshift({ stock: tick, option: type, entry: ent, count: 1, status: 'OPEN', entryTime: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), setups: setups, timestamp: new Date().toISOString() });
            }
            resetForm(); render();
        };

        function editTrade(i) {
            const t = trades[i]; document.getElementById('editId').value = i;
            document.getElementById('entry').value = t.entry;
            document.getElementById('exit').disabled = false;
            document.getElementById('submitBtn').innerText = "Update / Close Trade";
        }

        function resetForm() {
            document.getElementById('tradeForm').reset();
            document.getElementById('editId').value = '';
            document.getElementById('exit').disabled = true;
            document.querySelectorAll('.active').forEach(b => b.classList.remove('active'));
        }

        document.querySelectorAll('.setup-btn').forEach(btn => btn.onclick = function() { this.classList.toggle('active'); });
        document.querySelectorAll('.toggle-btn').forEach(btn => btn.onclick = function() { this.parentElement.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active')); this.classList.add('active'); });

        window.onload = () => { render(); document.getElementById('currentDateDisplay').innerText = new Date().toDateString(); };
    </script>
</body>
</html>

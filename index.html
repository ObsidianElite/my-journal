<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Obsidian Elite | Quant Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #030508; color: #ffffff; font-family: 'JetBrains Mono', monospace; overflow-x: hidden; }
        .stat-card { background: linear-gradient(145deg, #0a0e14 0%, #06090c 100%); border: 1px solid #1f2937; border-radius: 16px; position: relative; overflow: hidden; }
        .stat-card::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, #00f2ff, transparent); opacity: 0.3; }
        
        label { color: #94a3b8; font-weight: 800; font-size: 10px; text-transform: uppercase; margin-bottom: 12px; display: block; letter-spacing: 0.1em; }
        input, select { background-color: #0d1117; border: 1px solid #30363d; color: #fff; padding: 12px; border-radius: 8px; font-size: 14px; width: 100%; transition: 0.3s; }
        input:focus { border-color: #00f2ff; box-shadow: 0 0 15px rgba(0, 242, 255, 0.1); }
        
        .gauge-container { position: relative; height: 120px; width: 120px; }
        .gauge-value { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.5rem; color: #00f2ff; text-shadow: 0 0 10px rgba(0, 242, 255, 0.5); }
        
        .metric-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .metric-label { font-size: 10px; font-weight: 700; color: #64748b; text-transform: uppercase; }
        .metric-val { font-size: 14px; font-weight: 800; }
        
        .btn-live { background: linear-gradient(135deg, #00f2ff 0%, #0077ff 100%); box-shadow: 0 4px 15px rgba(0, 119, 255, 0.3); transition: 0.3s; }
        .btn-live:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 119, 255, 0.5); }
        
        .toggle-btn.active[data-val="Y"], .toggle-btn.active[data-val="BUY"] { background: #059669; box-shadow: 0 0 10px rgba(16, 185, 129, 0.4); color: #fff; }
        .toggle-btn.active[data-val="N"], .toggle-btn.active[data-val="SELL"] { background: #dc2626; box-shadow: 0 0 10px rgba(220, 38, 38, 0.4); color: #fff; }

        .status-pill { padding: 2px 8px; border-radius: 4px; font-size: 9px; font-weight: 900; letter-spacing: 1px; }
        .pill-open { background: rgba(0, 242, 255, 0.1); color: #00f2ff; border: 1px solid #00f2ff; animation: pulse 2s infinite; }
        
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="p-8">
    <div class="max-w-[1800px] mx-auto">
        
        <div class="flex justify-between items-end mb-10">
            <div>
                <div class="flex items-center gap-3">
                    <div class="h-10 w-2 bg-cyan-500 rounded-full shadow-[0_0_15px_#06b6d4]"></div>
                    <h1 class="text-4xl font-black tracking-tighter uppercase">Obsidian <span class="text-cyan-500">Elite</span></h1>
                </div>
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-[0.3em] mt-2">Quantitative Performance Terminal // <span id="currentDateDisplay" class="text-white"></span></p>
            </div>
            <div class="flex gap-6">
                <div class="text-right">
                    <p class="text-[10px] text-slate-500 font-black uppercase">Net Liquidity</p>
                    <p id="totalPnl" class="text-4xl font-black text-white">$0.00</p>
                </div>
                <div class="text-right border-l border-slate-800 pl-6">
                    <p class="text-[10px] text-slate-500 font-black uppercase">Exposure</p>
                    <p id="activeCount" class="text-4xl font-black text-cyan-500">0</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 mb-10">
            
            <div class="lg:col-span-2 stat-card p-8">
                <label>Equity Curve (Daily Realized)</label>
                <div class="h-[240px] w-full">
                    <canvas id="dailyPnlChart"></canvas>
                </div>
            </div>

            <div class="stat-card p-8 flex flex-col items-center justify-center">
                <label class="self-start">Execution Precision</label>
                <div class="gauge-container mb-4">
                    <canvas id="winLossChart"></canvas>
                    <div class="gauge-value" id="winRatioPercent">0%</div>
                </div>
                <p class="text-[10px] text-slate-500 font-bold uppercase">Success Rate</p>
            </div>

            <div class="stat-card p-8">
                <label>Efficiency Matrix</label>
                <div class="mt-4">
                    <div class="metric-row">
                        <span class="metric-label">Profit Factor</span>
                        <span id="profitFactor" class="metric-val text-cyan-400">0.00</span>
                    </div>
                    <div class="metric-row">
                        <span class="metric-label">Avg Win Hold</span>
                        <span id="avgWinTime" class="metric-val text-emerald-400">0m</span>
                    </div>
                    <div class="metric-row">
                        <span class="metric-label">Avg Loss Hold</span>
                        <span id="avgLossTime" class="metric-val text-rose-500">0m</span>
                    </div>
                    <div class="metric-row border-none">
                        <span class="metric-label">Hold Efficiency</span>
                        <span id="holdEfficiency" class="metric-val text-white">0%</span>
                    </div>
                </div>
                <div class="mt-6 pt-4 border-t border-slate-800">
                    <p class="text-[9px] text-slate-600 font-bold uppercase mb-2">Edge Indicator</p>
                    <div class="w-full bg-slate-900 h-1.5 rounded-full overflow-hidden">
                        <div id="edgeBar" class="bg-cyan-500 h-full transition-all duration-1000" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 mb-10 items-end">
            <div class="lg:col-span-12">
                <label>Command Override [Asset Type Size Price]</label>
                <input type="text" id="cmdInput" class="bg-[#0a0e14] border-2 border-slate-800 p-4 text-cyan-400 text-lg font-bold rounded-xl placeholder:text-slate-700" placeholder="e.g. TSLA C 10 2.45">
            </div>
        </div>

        </div>

    </body>
</html>
